# TAC v2 — same as buggy pi05_flatten_fold_a_new_pure_200_tac but with
# the pi0.py:335 convention bug fix (commit 5b6b75c).
# Buggy 26k ckpt at /vePFS-North-E/.../checkpoints/pi05_flatten_fold_a_new_pure_200_tac/...
# is preserved untouched for A/B comparison.
TaskName: "pi05-a-new-pure-200-tac-v2-cnbj-8gpu"
Description: "TAC pure_200 retrain after pi0.py:335 fix (prefix time 1.0 → 0.0 clean GT). Compare against buggy _tac/26k baseline."
Framework: "Custom"
ImageUrl: "dvs-cr-cn-beijing.cr.volces.com/vis_robot/kai:kai0-gf1"
ResourceQueueName: "Robot-North-H20"
ActiveDeadlineSeconds: 172800

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni3ln.45xlarge"

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnbj875793a96d6b"
    MountPath: "/vePFS-North-E/vis_robot"
    SubPath: "/vis_robot"

CacheType: ""

Envs:
  - Name: "PYTHONUNBUFFERED"
    Value: "1"
  - Name: "XLA_PYTHON_CLIENT_MEM_FRACTION"
    Value: "0.9"
  - Name: "OMP_NUM_THREADS"
    Value: "8"

Entrypoint: |
  set -euo pipefail
  cd /vePFS-North-E/vis_robot/workspace/deepdive_kai0/kai0
  source .venv/bin/activate
  apt-get update 2>&1 | tail -1 && apt-get install -y ffmpeg 2>&1 | tail -2 || echo "ffmpeg install best-effort"
  export PYTHONUNBUFFERED=1
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  mkdir -p /vePFS-North-E/vis_robot/logs
  LOG=/vePFS-North-E/vis_robot/logs/pi05_a_new_pure_200_tac_v2_${STAMP}.log
  # Verify the pi0.py:335 fix is in place before launching (sanity check).
  echo "[$(date)] verifying TAC convention fix on pi0.py:335 ..."
  if ! grep -nE "jnp\.where\(prefix_mask_tac, 0\.0," src/openpi/models/pi0.py >/dev/null; then
    echo "FATAL: TAC convention fix NOT detected at pi0.py:335. Aborting." >&2
    grep -nE "prefix_mask_tac" src/openpi/models/pi0.py | head -5 >&2
    exit 13
  fi
  echo "[$(date)] TAC fix verified, launching training"
  exec python -u scripts/train.py pi05_flatten_fold_a_new_pure_200_tac_v2 \
      --exp-name pi05_flatten_fold_a_new_pure_200_tac_v2 \
      --fsdp-devices 8 \
      --num-workers 16 \
      --no-wandb-enabled \
      --resume \
      > "$LOG" 2>&1

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
