# LMWM r-脊 recurrence Path A [V5(a) 结构接法]: 4×H20, 25000步, save_interval=5000
# vs lmwm_milestone_finalarch: 目标 milestone → recurrence r-脊(下一段canonical收敛点) + 末段锚末帧(100%覆盖)
#   修 milestone+1 两病根: ①目标从"边界(分歧点)"改"脊(canonical)"(V3b: 谷=最差/脊胜固定67%)
#                          ②末段不再丢弃(内在: 前向gain 2.1× 0.037→0.079)
# 依赖(提交前须在 North-E 就位): libero_rvalley/{pairs.npz, target_compact.npz} + checkpoints/lmwm_libero_rvalley/lmwm.pt
# 提交: cd ~/workspace/deepdive_kai0/train_scripts/kai/volc
#   /vePFS-North-E/vis_robot/workspace/deepdive_kai0/kai0/.venv/bin/python submit_yaml.py lmwm_rvalley_recurridge_4h20.yaml

TaskName: "lmwm-rvalley-recurridge-8h20"
Description: "LMWM r-ridge recurrence Path A [V5a structural], 8×H20, 12500steps(=4卡25000同样本量,~2x快), LIBERO"
Tags: []

ImageUrl: "dvs-cr-cn-beijing.cr.volces.com/vis_robot/kai:kai0-gf1"
ResourceQueueName: "Robot-North-H20"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni3ln.45xlarge"   # 8×H20 整节点(Robot-North-H20 不支持 FlexibleResourceClaim)

ActiveDeadlineSeconds: 43200   # 12h
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnbj875793a96d6b"
    MountPath: "/vePFS-North-E/vis_robot"
    SubPath: "/vis_robot"

CacheType: "Cloudfs"

Envs:
  - Name: PYTHONUNBUFFERED
    Value: "1"
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: OMP_NUM_THREADS
    Value: "8"

Entrypoint: |
  set -uo pipefail
  REPO=/vePFS-North-E/vis_robot/workspace/deepdive_kai0
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=$REPO/lmvla/lawam/logs/volc_dualarm
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/armMpp_rvalley_recurridge_${STAMP}.log"
  exec >> "$LOG" 2>&1
  set -x
  echo "=== ARM M'' (r-ridge recurrence Path A) start $(date -u) ==="

  nvidia-smi -L | head
  python3 -c "import torch; print('torch', torch.__version__, 'cuda', torch.cuda.is_available())"

  # 安装 starVLA 依赖
  pip install --quiet accelerate==1.13.0 transformers==5.2.0 2>&1 | tail -3
  pip install --quiet flash-attn==2.8.3 --no-build-isolation 2>&1 | tail -3 || echo "[warn] flash-attn skipped"

  cd $REPO/lmvla/lawam
  python3 -c "
  import torch, transformers, accelerate
  print(f'torch={torch.__version__} tf={transformers.__version__} acc={accelerate.__version__}')
  from starVLA.model.framework.vlas.lawam import LatentWorldPolicyBackend
  print('LatentWorldPolicyBackend import OK')
  "

  LMWM=$REPO/lmvla/lmwm
  MS=$LMWM/data/libero_rvalley                       # r-脊 recurrence pairs 目录
  for f in "$LMWM/checkpoints/lmwm_libero_rvalley/lmwm.pt" "$MS/pairs.npz" "$MS/target_compact.npz"; do
    [ -f "$f" ] || { echo "FATAL: $f missing" >&2; exit 13; }
  done
  echo "[$(date)] preflight OK (r-ridge recurrence pairs)"

  export CUDA_VISIBLE_DEVICES=0,1,2,3,4,5,6,7
  export MASTER_PORT=29512
  export LMWM_CKPT=$LMWM/checkpoints/lmwm_libero_rvalley/lmwm.pt      # 生成器 init(r-脊pairs训)
  export LMWM_MILESTONE_TARGET=$MS/pairs.npz
  export LMWM_TARGET_COMPACT=$MS/target_compact.npz
  export LMWM_ADAPTER_DIR=$REPO/lmvla/lawam
  export LMWM_SWAP_TEACHER=1
  export LAWAM_RUN_TIMESTAMP=${STAMP}

  bash train_lawam_distributed.sh \
    --config_yaml starVLA/config/training/train_libero.yaml \
    --run_id=lmwm_rvalley_recurridge_volc \
    --trainer.max_train_steps=12500 \
    --trainer.save_interval=2500

  echo "=== ARM M'' (r-ridge recurrence) DONE $(date -u) ==="

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
