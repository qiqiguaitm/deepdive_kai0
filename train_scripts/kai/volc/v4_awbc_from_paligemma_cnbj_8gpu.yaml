# AWBC v4 × from-PaliGemma-base (pi05_v4_awbc_from_paligemma) — cnbj 1-host 8 H20, 100k
#   闲时任务 (Preemptible): 借空闲资源, 可被抢占; 入口自动从最新 ckpt resume (ckpt 在共享 vePFS).
#   Data: A_v4_base_dagger (1824ep labeled, AE adv_est_v1 + discretize top-30%, 已 staged 至 gf3 /vePFS-North-E)
#   Init: PaliGemma VLM npz (本地, action expert 随机) | 冷启动 LR warmup3k/peak3e-5/decay100k/end3e-6
#   Plan: docs/training/future_plans/plans/pi05_v4_awbc_from_paligemma_plan.md §3/§7
#   对照: 姊妹 pi05_v4_awbc (warm-start pi05_base/50k, cnsh mmdhx) = from-base vs warm-start 在 v4 AWBC.
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/v4_awbc_from_paligemma_cnbj_8gpu.yaml
TaskName: "pi05-v4-awbc-from-paligemma-cnbj-8gpu"
Description: "v4 AWBC from-PaliGemma base (A_v4_base_dagger labeled, single domain): JAX 1-host 8 H20, 100k, 闲时+resume"
Tags: []

ImageUrl: "dvs-cr-cn-beijing.cr.volces.com/vis_robot/kai:kai0-gf1"
ResourceQueueName: "Robot-North-H20"
Framework: "PyTorch"
Preemptible: true               # 闲时任务: 借空闲资源, 可被抢占 → 入口自动 resume

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni3ln.45xlarge"   # 8× H20-SXM5-96GB single node

ActiveDeadlineSeconds: 1209600  # 14 天/run (100k from-base 慢; 被抢占重提 deadline 重置)
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnbj875793a96d6b"
    MountPath: "/vePFS-North-E/vis_robot"
    SubPath: "/vis_robot"

CacheType: "Cloudfs"

Envs:
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"
  - Name: PALIGEMMA_NPZ
    Value: "/vePFS-North-E/vis_robot/openpi_cache/paligemma_weights/pt_224.npz"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  LOG_DIR=/vePFS-North-E/vis_robot/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/v4_awbc_from_paligemma_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) (1-host 8 H20, 闲时任务) ==="
  set -x
  nvidia-smi -L
  REPO=/vePFS-North-E/vis_robot/workspace/deepdive_kai0
  cd "$REPO/kai0"
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  TRAIN=$REPO/kai0/data/Task_A/self_built/A_v4_base_dagger
  NPZ=/vePFS-North-E/vis_robot/openpi_cache/paligemma_weights/pt_224.npz
  VAL=$REPO/kai0/data/Task_A/self_built/vis_v2_merged_val
  [ -f "$TRAIN/meta/episodes.jsonl" ]   || { echo "FATAL: v4 labeled data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]       || { echo "FATAL: v4 norm_stats missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/meta/tasks.jsonl" ]      || { echo "FATAL: discretized tasks.jsonl missing" >&2; exit 13; }
  [ -f "$NPZ" ]                         || { echo "FATAL: PaliGemma npz missing $NPZ" >&2; exit 13; }
  [ -f "$VAL/meta/episodes.jsonl" ]     || { echo "FATAL: inline-eval val missing $VAL" >&2; exit 13; }
  # 抽检一条 video symlink 能否解析 (staged 后 retarget 至 /vePFS-North-E)
  SL=$(find "$TRAIN/videos" -type l | head -1)
  [ -e "$SL" ] || { echo "FATAL: video symlink broken (retarget 失败?) $SL -> $(readlink "$SL")" >&2; exit 13; }
  echo "[$(date)] preflight OK (v4 labeled data + norm + tasks + PaliGemma npz + val + video symlink verified)"

  # 自动 resume: ckpt 在共享 vePFS (kai0/checkpoints/<config>/<exp>); 有 step 目录 → --resume, 否则 --overwrite.
  EXP=v4_awbc_from_paligemma_cnbj
  CKPT_DIR=$REPO/kai0/checkpoints/pi05_v4_awbc_from_paligemma/$EXP
  if ls -d "$CKPT_DIR"/[0-9]*/ >/dev/null 2>&1; then
    RESUME_FLAG="--resume"; echo "[resume] found existing ckpt in $CKPT_DIR -> --resume"
  else
    RESUME_FLAG="--overwrite"; echo "[resume] no ckpt yet -> fresh --overwrite"
  fi

  exec python -u scripts/train.py pi05_v4_awbc_from_paligemma \
    --exp-name "$EXP" \
    --no-wandb-enabled \
    --save-interval 2000 \
    $RESUME_FLAG

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 3            # 崩溃/抢占重试; 入口 --resume 续训

AccessType: "Public"
