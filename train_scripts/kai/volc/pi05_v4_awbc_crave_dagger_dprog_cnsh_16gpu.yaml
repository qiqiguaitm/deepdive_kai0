# CRAVE dagger 冻结标签级修复 (Δprogress + 速度门控) — chunk-001 dagger AWBC 16-card, robot-task cnsh
#   plan: docs/training/future_plans/plans/dagger_launchpoint_trim_freeze_fix_plan.md §9
#   Config: pi05_v4_awbc_chunk001_dagger_crave_dprog (JAX, fsdp=16, bs256, pi05_base init, 50k)
#   Data:   A_v4_chunk001_dagger_crave_dprog_launchtrim (774ep: 387 base + 387 dagger)
#           advantage=Δprogress(spg[t+50]-spg[t]) + 速度门控(臂动才可 positive) → static-positive=0%; dagger launchtrim 裁边界
#   ⭐ 单变量 vs t6dgl(原 _labeled, advantage≡progress 复现冻结): 唯一变量=repo_id(标签/裁剪).
#      判据: 修复版不冻 而 t6dgl 冻 → 坐实 "progress-level+不门控静止" 是冻结源, Δprog+门控是标签级修复.
#   16卡 (2 节点 × 8 A100); JAX multi-node fsdp=16.
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/pi05_v4_awbc_crave_dagger_dprog_cnsh_16gpu.yaml

TaskName: "pi05-v4-awbc-crave-dagger-dprog-cnsh-16gpu"
Description: "CRAVE dagger 冻结修复(Δprog+速度门控): chunk-001 dagger AWBC 774ep, static-positive=0%, JAX 2x8=16 A100 50k. 单变量 vs t6dgl 冻结对照"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"          # injects MLP_WORKER_0_HOST / MLP_WORKER_0_PORT / MLP_WORKER_NUM / MLP_ROLE_INDEX

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 2
    Flavor: "ml.hpcpni2.28xlarge"     # 8× A100-80G per host × 2 = 16 GPU

ActiveDeadlineSeconds: 259200           # 72 h cap

EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: WANDB_MODE
    Value: "offline"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: XLA_PYTHON_CLIENT_PREALLOCATE
    Value: "false"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"

  NNODES=${MLP_WORKER_NUM:-2}
  NODE_RANK=${MLP_ROLE_INDEX:-0}
  MASTER_ADDR=${MLP_WORKER_0_HOST:-127.0.0.1}
  MASTER_PORT=${MLP_WORKER_0_PORT:-14524}
  NPROC_PER_NODE=8
  TOTAL_PROC=$((NNODES * NPROC_PER_NODE))

  echo "=== CRAVE dagger dprog AWBC JAX multi-node start $(date) node=$NODE_RANK/$NNODES master=$MASTER_ADDR:$MASTER_PORT total_proc=$TOTAL_PROC ==="
  set -ex
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  mkdir -p /home/tim/.local/share /root/.local/share
  ln -sfn /vePFS/tim/.local/share/uv /home/tim/.local/share/uv 2>/dev/null || true
  ln -sfn /vePFS/tim/.local/share/uv /root/.local/share/uv 2>/dev/null || true
  cd "$KAI0"
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  # PRE-FLIGHT
  TRAIN=$KAI0/data/Task_A/self_built/A_v4_chunk001_dagger_crave_dprog_launchtrim
  INIT=$KAI0/checkpoints/pi05_base/params
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: train data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: norm_stats missing" >&2; exit 13; }
  grep -q "Advantage: positive" "$TRAIN/meta/tasks.jsonl" || { echo "FATAL: tasks.jsonl 缺 advantage prompt (未 discretize?)" >&2; exit 13; }
  python -c "import pyarrow.parquet as pq,glob,sys; f=sorted(glob.glob('$TRAIN/data/chunk-000/*.parquet'))[0]; cols=[c.name for c in pq.read_schema(f)]; sys.exit(0 if 'stage_progress_gt' in cols and 'absolute_advantage' in cols else 13)" || { echo "FATAL: stage_progress_gt/absolute_advantage missing" >&2; exit 13; }
  [ -f "$INIT/_METADATA" ]            || { echo "FATAL: pi05_base init missing $INIT" >&2; exit 13; }
  echo "[$(date)] preflight OK (data + norm_stats + discretize + init)"

  # Launch 8 JAX processes per node; each binds to one GPU via CUDA_VISIBLE_DEVICES
  EXP=chunk001_dagger_crave_dprog
  CKPT_DIR=$KAI0/checkpoints/pi05_v4_awbc_chunk001_dagger_crave_dprog/$EXP
  RESUME_FLAG="--overwrite"
  if ls -d "$CKPT_DIR"/[0-9]*/ >/dev/null 2>&1; then RESUME_FLAG="--resume"; echo "[resume] found ckpt → --resume"; fi

  PIDS=()
  for ((i=0; i<NPROC_PER_NODE; i++)); do
    PROC_IDX=$((NODE_RANK * NPROC_PER_NODE + i))
    LOG="$LOG_DIR/pi05_crave_dagger_dprog_16gpu_${STAMP}_proc${PROC_IDX}.log"
    echo "  → proc $PROC_IDX/$TOTAL_PROC (GPU $i) log=$LOG"

    CUDA_VISIBLE_DEVICES=$i \
    JAX_COORDINATOR_ADDRESS=$MASTER_ADDR:$MASTER_PORT \
    JAX_NUM_PROCESSES=$TOTAL_PROC \
    JAX_PROCESS_INDEX=$PROC_IDX \
      python -u scripts/train.py pi05_v4_awbc_chunk001_dagger_crave_dprog \
        --exp-name $EXP \
        --no-wandb-enabled \
        $RESUME_FLAG \
        >> "$LOG" 2>&1 &
    PIDS+=($!)
  done

  echo "[$(date)] all $NPROC_PER_NODE procs launched, waiting..."
  FAIL=0
  for pid in "${PIDS[@]}"; do
    if ! wait $pid; then FAIL=$((FAIL+1)); fi
  done
  if [ $FAIL -gt 0 ]; then echo "FATAL: $FAIL/$NPROC_PER_NODE procs failed" >&2; exit 1; fi
  echo "[$(date)] DONE — all procs completed successfully"

RetryOptions:
  EnableRetry: false
