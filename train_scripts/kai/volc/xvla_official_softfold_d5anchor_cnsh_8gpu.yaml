# XVLA Exp-O (§0.NEW.7 数据隔离): 官方 Soft-Fold, 同 pipeline 同参数, 只换数据 → 隔离"我们数据本身是否有问题"
#   单变量 vs Exp-S (X3C_smooth800_d5anchor): 仅数据内容不同 (官方 1532ep hdf5 vs 我们 811ep smooth800)。
#   官方数据走 XVLAHdf5Dataset + action_qdur=2.0 (D5 anchor) + ImageNet + ColorJitter — 与 Exp-S 逐项对齐。
#   数据本地已就位 (xvla/data/xvla_soft_fold 441G), 无需传输。
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/xvla_official_softfold_d5anchor_cnsh_8gpu.yaml
TaskName: "xvla-official-softfold-d5anchor-cnsh-8gpu"
Description: "Exp-O 官方 Soft-Fold (1532ep, 同 pipeline vs Exp-S): torch DDP 8 A100, 60k"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G single node

ActiveDeadlineSeconds: 259200
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/xvla_official_softfold_d5anchor_${STAMP}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) ==="
  set -x
  nvidia-smi -L
  REPO=/vePFS/tim/workspace/deepdive_kai0
  VENV=$REPO/xvla/X-VLA-env/.venv
  INIT=$REPO/xvla/xvla_ckpts
  OUT=$REPO/xvla/ckpts/xvla_official_softfold_d5anchor
  mkdir -p "$OUT"
  export XVLA_CKPT_INIT="$INIT"
  export XVLA_BART_TOK=$REPO/xvla/assets/bart-large-tokenizer
  export XVLA_SOFTFOLD_ROOT=$REPO/xvla/data/xvla_soft_fold
  export XVLA_SOFTFOLD_CACHE=$REPO/xvla/data/xvla_soft_fold/action_ee6d_cache

  "$VENV/bin/python" -c "import torch; from lerobot.policies.xvla.modeling_xvla import XVLAPolicy; print('venv OK torch', torch.__version__, 'cuda', torch.cuda.is_available(), 'ngpu', torch.cuda.device_count())"
  ls "$XVLA_SOFTFOLD_ROOT"/*/episode_*.hdf5 >/dev/null 2>&1 || { echo "FATAL: soft_fold hdf5 missing" >&2; exit 13; }
  NPY=$(ls "$XVLA_SOFTFOLD_CACHE"/*.npy 2>/dev/null | wc -l)
  [ "$NPY" -ge 1500 ] || { echo "FATAL: ee6d action cache incomplete ($NPY < 1500)" >&2; exit 13; }
  [ -f "$INIT/config.json" ]            || { echo "FATAL: init missing" >&2; exit 13; }
  [ -f "$XVLA_BART_TOK/tokenizer.json" ] || { echo "FATAL: bart tokenizer missing" >&2; exit 13; }
  "$VENV/bin/python" -c "import os; from transformers import AutoTokenizer; AutoTokenizer.from_pretrained(os.environ['XVLA_BART_TOK']); print('bart tokenizer offline OK')"
  echo "[$(date)] preflight OK (ee6d cache $NPY npy)"

  cd $REPO/train_scripts/xvla/launch
  exec "$VENV/bin/python" -m torch.distributed.run --standalone --nproc_per_node=8 xvla_train.py \
    --config X3_official_softfold_d5anchor \
    --output_dir "$OUT" \
    --workers 4

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 1

AccessType: "Public"
