# 夹爪 action 裁剪实验 (clip) — cnsh 单节点 8 GPU (A100), Robot-GPU 开发机队列
#   单变量 vs pi05_flatten_fold_A_smooth800_dagger_full: 数据集换 clip 版 (action[:,[6,13]] ≤5mm→0,
#   state/arm 不动) + 各自 norm_stats。init mixed_1_clean。Plan: docs/.../gripper_action_clip_experiment.md
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/smooth800_dagger_clip_cnsh_8gpu.yaml

TaskName: "pi05-smooth800-dagger-clip-cnsh-8gpu"
Description: "gripper-action-clip (≤5mm→0) from mixed_1_clean: JAX 单节点 8 A100, 50k (Robot-GPU 开发机队列)"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "Robot-GPU开发机队列"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G + 112 vCPU (Preset 整机; CreateJob 不允许自定义 CPU)

ActiveDeadlineSeconds: 259200      # 50k step 单机 ~26h + 余量
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/smooth800_dagger_clip_cnsh_${STAMP}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) (single-node 8 GPU, cnsh, Robot-GPU 开发机队列) ==="
  set -ex
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  if [ ! -x "$HOME/.local/bin/uv" ]; then curl -LsSf https://astral.sh/uv/install.sh | sh; fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -2
  mkdir -p /home/tim/.local/share && ln -sfn /root/.local/share/uv /home/tim/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  TRAIN=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_smooth800_dagger_clip_all
  INIT=/vePFS/tim/shared_ckpt/Task_A/mixed_1_clean/params
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: clip data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: norm_stats missing" >&2; exit 13; }
  [ -f "$INIT/_METADATA" ]            || { echo "FATAL: mixed_1_clean init missing $INIT" >&2; exit 13; }
  echo "[$(date)] clip data + norm_stats + mixed_1_clean init verified"

  exec python -u scripts/train.py pi05_smooth800_dagger_clip_all \
    --exp-name smooth800_dagger_clip_cnsh \
    --data.repo_id "$TRAIN" \
    --weight-loader.params-path "$INIT" \
    --no-wandb-enabled \
    --overwrite

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 1

AccessType: "Public"
