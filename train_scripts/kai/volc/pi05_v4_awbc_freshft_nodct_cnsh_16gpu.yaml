# Mode B 冻结排查 E1 — 去 DCT 重训 (pi05_v4_awbc_modeB_freeze_diagnosis_plan.md §1 E1)
#   唯一变量 = 关 use_dct_loss. config pi05_v4_awbc_freshft_nodct (克隆 freshft, model=Pi0Config(pi05=True) 无DCT).
#   Data: A_v4_freshdagger_ft (973ep). Init: E1b 非-DCT twin pi05_v4_awbc/49999/params (DCT归因最干净) [config内].
#   robot-task 2×8=16 A100 (JAX 多机加速), 30k 低LR. 判据=真机回折过渡是否还冻>5s.
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/pi05_v4_awbc_freshft_nodct_cnsh_16gpu.yaml
TaskName: "pi05-v4-awbc-freshft-nodct-cnsh-16gpu"
Description: "Mode B 排查 E1 去DCT重训: pi05_v4_awbc_freshft_nodct on A_v4_freshdagger_ft, JAX 2×8 A100 30k 低LR (E1b 非DCT init)"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"          # injects MLP_WORKER_0_HOST / MLP_WORKER_NUM / MLP_ROLE_INDEX

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 2
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G per host × 2 = 16 GPU

ActiveDeadlineSeconds: 259200  # 3d
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/pi05_v4_awbc_freshft_nodct_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) node=$NODE/${MLP_WORKER_NUM:-2} (E1 去DCT, 2-host 16 A100) ==="
  set -ex
  nvidia-smi -L
  echo "[multinode] host0=${MLP_WORKER_0_HOST} num=${MLP_WORKER_NUM} idx=${MLP_ROLE_INDEX}"

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  if [ ! -x "$HOME/.local/bin/uv" ]; then curl -LsSf https://astral.sh/uv/install.sh | sh; fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -2
  mkdir -p /home/tim/.local/share && ln -sfn /root/.local/share/uv /home/tim/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate

  # JAX 多机协调 (openpi train.py:432 读这些 env → jax.distributed.initialize)
  export JAX_COORDINATOR_ADDRESS="${MLP_WORKER_0_HOST}:15830"
  export JAX_NUM_PROCESSES="${MLP_WORKER_NUM:-2}"
  export JAX_PROCESS_INDEX="${MLP_ROLE_INDEX:-0}"
  echo "[jax-dist] coord=$JAX_COORDINATOR_ADDRESS nproc=$JAX_NUM_PROCESSES idx=$JAX_PROCESS_INDEX"

  # PRE-FLIGHT
  TRAIN=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_v4_freshdagger_ft
  INIT=/vePFS/tim/workspace/deepdive_kai0/kai0/checkpoints/pi05_v4_awbc/pi05_v4_awbc/49999/params   # E1b 非-DCT twin
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: freshft data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: norm_stats missing" >&2; exit 13; }
  grep -q "Advantage: positive" "$TRAIN/meta/tasks.jsonl" || { echo "FATAL: tasks.jsonl 无 advantage prompt" >&2; exit 13; }
  [ -f "$INIT/_METADATA" ]            || { echo "FATAL: E1b init ckpt (pi05_v4_awbc/49999/params) missing $INIT" >&2; exit 13; }
  echo "[$(date)] preflight OK (freshft data + norm + discretized tasks + 非DCT-49999 init)"

  EXP=pi05_v4_awbc_freshft_nodct
  CKPT_DIR=$KAI0/checkpoints/pi05_v4_awbc_freshft_nodct/$EXP
  if ls -d "$CKPT_DIR"/[0-9]*/ >/dev/null 2>&1; then
    RESUME_FLAG="--resume"; echo "[resume] found ckpt -> --resume"
  else
    RESUME_FLAG="--overwrite"; echo "[resume] no ckpt -> fresh --overwrite (finetune from 非DCT/49999/params)"
  fi

  exec python -u scripts/train.py pi05_v4_awbc_freshft_nodct \
    --exp-name pi05_v4_awbc_freshft_nodct \
    --no-wandb-enabled \
    $RESUME_FLAG

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 2

AccessType: "Public"
