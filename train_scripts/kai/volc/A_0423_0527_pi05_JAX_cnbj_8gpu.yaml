# A_0423_0527 Run-A on BEIJING (Robot-North-H20) — pi05_base init, JAX
#
#   Config:  pi05_flatten_fold_A_0423_0527 (CLI-override paths → cnbj /vePFS-North-E)
#   Data:    A_0423_0527 (dereferenced COPY from cnsh via TOS — bit-identical, NOT rebuilt,
#            so train/val 与 cnsh runs 完全一致, 对比直观)
#   Val:     vis_v2_merged_val (cnbj copy, same 30 ep)
#   Init:    pi05_base (cnbj)
#   Spec:    8 H20-SXM5-96GB single node, batch=128, 50k step
#   ETA:     ~24-30h (H20 比 A100 快 ~1.5×)
#
# PREREQUISITE: A_0423_0527 extracted to cnbj self_built/ (via tar deref → TOS → extract).
#
# Submit (from gf0):
#   ssh gf0; source ~/.volc_creds
#   /vePFS/tim/workspace/deepdive_kai0/kai0/.venv/bin/python \
#     /vePFS/tim/workspace/deepdive_kai0/train_scripts/kai/volc/submit_yaml.py \
#     /vePFS/tim/workspace/deepdive_kai0/train_scripts/kai/volc/A_0423_0527_pi05_JAX_cnbj_8gpu.yaml

TaskName: "a-0423-0527-pi05-jax-cnbj-8gpu"
Description: "Run-A on Beijing H20: JAX A_0423_0527 + pi05_base (data is TOS deref-copy from cnsh, identical)"
Framework: "Custom"
ImageUrl: "dvs-cr-cn-beijing.cr.volces.com/vis_robot/kai:kai0-gf1"
ResourceQueueName: "Robot-North-H20"
ActiveDeadlineSeconds: 172800

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni3ln.45xlarge"     # 8× H20-SXM5-96GB

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnbj875793a96d6b"
    MountPath: "/vePFS-North-E/vis_robot"
    SubPath: "/vis_robot"

CacheType: ""

Envs:
  - Name: PYTHONUNBUFFERED
    Value: "1"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.9"
  - Name: OMP_NUM_THREADS
    Value: "8"

Entrypoint: |
  set -uo pipefail
  cd /vePFS-North-E/vis_robot/workspace/deepdive_kai0/kai0
  source .venv/bin/activate
  apt-get update 2>&1 | tail -1 && apt-get install -y ffmpeg 2>&1 | tail -2 || echo "ffmpeg best-effort"
  export PYTHONUNBUFFERED=1
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  mkdir -p /vePFS-North-E/vis_robot/logs
  LOG=/vePFS-North-E/vis_robot/logs/A_0423_0527_pi05_JAX_cnbj_${STAMP}.log
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) ==="
  set -ex
  nvidia-smi -L
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  # cnbj paths
  TRAIN=/vePFS-North-E/vis_robot/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_0423_0527
  VAL=/vePFS-North-E/vis_robot/workspace/deepdive_kai0/kai0/data/Task_A/self_built/vis_v2_merged_val
  INIT=/vePFS-North-E/vis_robot/base_init_ckpts/extracted/pi05_base/params

  # PRE-FLIGHT (防 5day_recent inline-eval=0 + 防数据缺失)
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: train data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: norm_stats missing $TRAIN/norm_stats.json" >&2; exit 13; }
  [ -f "$VAL/meta/episodes.jsonl" ]   || { echo "FATAL: val missing $VAL" >&2; exit 13; }
  [ -d "$INIT" ]                      || { echo "FATAL: pi05_base init missing $INIT" >&2; exit 13; }
  # verify a sample video resolves (deref-copy must be real files, not dangling)
  python -c "import av,glob; f=sorted(glob.glob('$TRAIN/videos/chunk-000/*/episode_000011.mp4'))[0]; av.open(f).close(); print('video OK', f)" || { echo "FATAL: video read failed (dangling copy?)" >&2; exit 13; }
  echo "[$(date)] all data + init + video verified"

  # Launch JAX FSDP=8, CLI-override all paths to cnbj
  exec python -u scripts/train.py pi05_flatten_fold_A_0423_0527 \
    --exp-name A_0423_0527_pi05_JAX \
    --data.repo_id "$TRAIN" \
    --weight-loader.params-path "$INIT" \
    --inline-eval-val-root "$VAL" \
    --no-wandb-enabled \
    --resume

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
