# XVLA E0 SMOKE 2k (--max_steps 2000) — 验证视频路径 bug 修复后训练真的喂"真实图"(不再黑图)。
#   背景: LeRobotEE6DDataset._video_path 旧版用全名 feature key 拼视频目录, v1 数据集是短名目录
#         → av.open 失败 → except 静默返回黑图 → E0/E1 全程训在黑图上 → vision-blind (非 proprio)。
#   修复: _video_path 先试全名、不存在退短名; 解码失败大声 warn (不再静默黑图)。
#   判据 (三选一过即可上 50k):
#     (1) 日志**无** "[multi_domain_dataset] WARN black-image fallback" (entrypoint 末尾自动 grep 计数=0)；
#     (2) 训练正常 forward/backward/save, loss 有限；
#     (3) step_002000 ckpt 跑 dataset vision-ablation, d_img 已 >0 (早期趋势, 非门禁)。
#   过则提交 xvla_e0_v1_official_cnsh_8gpu.yaml 跑满 50k (用同一修好的 loader)。
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/xvla_e0_smoke2k_fixedcam_cnsh_8gpu.yaml
TaskName: "xvla-e0-smoke2k-fixedcam-cnsh-8gpu"
Description: "E0 smoke 2k (max_steps=2000): 验证视频路径修复后训练喂真实图 (非黑图)"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G single node

ActiveDeadlineSeconds: 14400
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/xvla_e0_smoke2k_fixedcam_${STAMP}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) ==="
  set -x
  nvidia-smi -L
  VENV=/vePFS/tim/workspace/deepdive_kai0/xvla/X-VLA-env/.venv
  XVLA_SB_DIR=/vePFS/tim/workspace/deepdive_kai0/xvla/data/self_built
  INIT=/vePFS/tim/workspace/deepdive_kai0/xvla/xvla_ckpts
  OUT=/vePFS/tim/workspace/deepdive_kai0/xvla/ckpts/xvla_e0_smoke2k_fixedcam
  mkdir -p "$OUT"
  export XVLA_SB="$XVLA_SB_DIR"
  export XVLA_CKPT_INIT="$INIT"
  export XVLA_BART_TOK=/vePFS/tim/workspace/deepdive_kai0/xvla/assets/bart-large-tokenizer

  "$VENV/bin/python" -c "import torch; from lerobot.policies.xvla.modeling_xvla import XVLAPolicy; print('venv OK torch', torch.__version__, 'cuda', torch.cuda.is_available(), 'ngpu', torch.cuda.device_count())"
  [ -f "$XVLA_SB_DIR/A_v1_noRelabel_ee6d/2026-04-23/meta/info.json" ] || { echo "FATAL: data missing" >&2; exit 13; }
  [ -f "$INIT/config.json" ]                                          || { echo "FATAL: init missing" >&2; exit 13; }
  [ -f "$XVLA_BART_TOK/tokenizer.json" ]                              || { echo "FATAL: bart tokenizer missing $XVLA_BART_TOK" >&2; exit 13; }
  "$VENV/bin/python" -c "import os; from transformers import AutoTokenizer; AutoTokenizer.from_pretrained(os.environ['XVLA_BART_TOK']); print('bart tokenizer offline OK')"
  echo "[$(date)] preflight OK"

  cd /vePFS/tim/workspace/deepdive_kai0/train_scripts/xvla/launch
  "$VENV/bin/python" -m torch.distributed.run --standalone --nproc_per_node=8 xvla_train.py \
    --config E0_v1_official \
    --output_dir "$OUT" \
    --workers 4 \
    --max_steps 2000
  RC=$?
  echo "=== train exit code: $RC ==="
  echo "=== BLACK-IMAGE FALLBACK CHECK (期望 0) ==="
  N_BLACK=$(grep -c "black-image fallback" "$LOG" || true)
  echo "black-image fallback warnings in log: $N_BLACK"
  if [ "$N_BLACK" = "0" ]; then echo "✅ NO black fallback → loader 喂真实图, 修复成立"; else echo "❌ 仍有黑图 fallback, 修复未生效, 不要上 50k"; fi
  exit $RC

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
