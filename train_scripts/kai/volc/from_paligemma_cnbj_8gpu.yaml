# 从 PaliGemma base 自训 (pi05_kaivis_from_paligemma, 路径 B1) — cnbj 1-host 8 H20, 150k
#   闲时任务 (Preemptible): 借空闲资源, 可被抢占; 入口自动从最新 ckpt resume (ckpt 在共享 vePFS).
#   Data: kai_vis_merged (7544ep, 已建于 gf3) | Init: PaliGemma VLM npz (本地, action expert 随机)
#   Plan: docs/training/future_plans/plans/pi05_from_paligemma_base_training_plan.md §4 B1
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/from_paligemma_cnbj_8gpu.yaml
TaskName: "pi05-from-paligemma-cnbj-8gpu"
Description: "from-PaliGemma B1 (kai_vis_merged, 2-domain cond): JAX 1-host 8 H20, 150k, 闲时+resume"
Tags: []

ImageUrl: "dvs-cr-cn-beijing.cr.volces.com/vis_robot/kai:kai0-gf1"
ResourceQueueName: "Robot-North-H20"
Framework: "PyTorch"
Preemptible: true               # 闲时任务: 借其它队列空闲资源, 可随时被抢占 → 入口自动 resume

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni3ln.45xlarge"   # 8× H20-SXM5-96GB single node

ActiveDeadlineSeconds: 1209600  # 14 天/run (150k step from-base 慢; 被抢占后重提 deadline 重置)
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnbj875793a96d6b"
    MountPath: "/vePFS-North-E/vis_robot"
    SubPath: "/vis_robot"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"
  - Name: PALIGEMMA_NPZ
    Value: "/vePFS-North-E/vis_robot/openpi_cache/paligemma_weights/pt_224.npz"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  LOG_DIR=/vePFS-North-E/vis_robot/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/from_paligemma_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) (1-host 8 H20, 闲时任务) ==="
  set -x
  nvidia-smi -L
  REPO=/vePFS-North-E/vis_robot/workspace/deepdive_kai0
  cd "$REPO/kai0"
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  TRAIN=$REPO/kai0/data/Task_A/self_built/kai_vis_merged
  NPZ=/vePFS-North-E/vis_robot/openpi_cache/paligemma_weights/pt_224.npz
  VAL=$REPO/kai0/data/Task_A/self_built/vis_v2_merged_val
  [ -f "$TRAIN/meta/episodes.jsonl" ]            || { echo "FATAL: merged data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_domain0_kai/norm_stats.json" ] || { echo "FATAL: kai norm missing" >&2; exit 13; }
  [ -f "$TRAIN/norm_domain1_vis/norm_stats.json" ] || { echo "FATAL: vis norm missing" >&2; exit 13; }
  [ -f "$NPZ" ]                                  || { echo "FATAL: PaliGemma npz missing $NPZ" >&2; exit 13; }
  [ -f "$VAL/meta/episodes.jsonl" ]              || { echo "FATAL: inline-eval val missing $VAL" >&2; exit 13; }
  echo "[$(date)] preflight OK (merged data + 2 per-domain norms + PaliGemma npz + val verified)"

  # 自动 resume: ckpt 在共享 vePFS (kai0/checkpoints/<config>/<exp>); 若已有 step 目录 → --resume, 否则 --overwrite (新建).
  EXP=from_paligemma_cnbj
  CKPT_DIR=$REPO/kai0/checkpoints/pi05_kaivis_from_paligemma/$EXP
  if ls -d "$CKPT_DIR"/[0-9]*/ >/dev/null 2>&1; then
    RESUME_FLAG="--resume"; echo "[resume] found existing ckpt in $CKPT_DIR -> --resume"
  else
    RESUME_FLAG="--overwrite"; echo "[resume] no ckpt yet -> fresh --overwrite"
  fi

  exec python -u scripts/train.py pi05_kaivis_from_paligemma \
    --exp-name "$EXP" \
    --no-wandb-enabled \
    $RESUME_FLAG

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 10            # 闲时被抢占后自愈重试 (配合入口 --resume 续训)

AccessType: "Public"
