# AWBC milestone-value A臂 — V2.4 零训练 value 直接当 advantage 源 (plan: awbc_milestone_value_AB_plan.md §3)
#   cnsh 1-host 8 A100, 50k. Config pi05_awbc_mv_A (clone of C臂 pi05_flatten_fold_awbc, 唯一变量=数据 ds_A).
#   Data: dagger_all_mvA (1112ep, V2.4-mv smoothed→discretized quantile-matched 25.2%neg) | Init: task_a_new_smooth_800_step49999
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/awbc_mv_A_cnsh_8gpu.yaml

TaskName: "pi05-awbc-mv-a-cnsh-8gpu"
Description: "AWBC mv-value A臂: pi05_awbc_mv_A on ds_A (V2.4 direct advantage), JAX 1-host 8 A100, 50k"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G

ActiveDeadlineSeconds: 259200
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/awbc_mv_A_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) node=$NODE (1-host 8 A100) ==="
  set -ex
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  if [ ! -x "$HOME/.local/bin/uv" ]; then curl -LsSf https://astral.sh/uv/install.sh | sh; fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -1
  mkdir -p /home/tim/.local/share && ln -sfn /root/.local/share/uv /home/tim/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  TRAIN=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/dagger_all_mvA
  INIT=/vePFS/tim/workspace/deepdive_kai0/kai0/checkpoints/task_a_new_smooth_800_step49999/params
  VAL=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/vis_v2_merged_val
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: ds_A missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: ds_A norm missing" >&2; exit 13; }
  [ -f "$TRAIN/meta/tasks.jsonl" ]    || { echo "FATAL: ds_A tasks.jsonl missing" >&2; exit 13; }
  [ -f "$INIT/_METADATA" ]            || { echo "FATAL: warm-start init missing $INIT" >&2; exit 13; }
  [ -f "$VAL/meta/episodes.jsonl" ]   || { echo "FATAL: inline-eval val missing $VAL" >&2; exit 13; }
  echo "[$(date)] preflight OK (ds_A + norm + tasks + warm-start + val)"

  exec python -u scripts/train.py pi05_awbc_mv_A \
    --exp-name awbc_mv_A \
    --no-wandb-enabled \
    --overwrite

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 1

AccessType: "Public"
