# LIBERO eval: Arm M'' (r-脊 recurrence Path A), libero_10 50trials/task
# 照抄 eval_libero_armM_4h20.yaml, 只换 CKPT(r-脊 steps_12500)+ LMWM_CKPT(r-脊 lmwm.pt)+ 名字
# 提交: gsy 上 cd train_scripts/kai/volc && kai0/.venv/bin/python submit_yaml.py eval_libero_armMpp_recurridge_4h20.yaml

TaskName: "eval-libero-armMpp-recurridge"
Description: "LIBERO eval Arm M'' (LMWM r-ridge recurrence), libero_10, 50trials/task"
Tags: []

ImageUrl: "dvs-cr-cn-beijing.cr.volces.com/vis_robot/kai:kai0-gf1"
ResourceQueueName: "Robot-North-H20"
Framework: "Custom"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.pni3ln.5xlarge"    # 单卡 H20 (20 vCPU/200 GiB/1 GPU) — eval 本就单卡

ActiveDeadlineSeconds: 43200
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnbj875793a96d6b"
    MountPath: "/vePFS-North-E/vis_robot"
    SubPath: "/vis_robot"

CacheType: "Cloudfs"

Envs:
  - Name: PYTHONUNBUFFERED
    Value: "1"
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: MUJOCO_GL
    Value: "egl"

Entrypoint: |
  set -uo pipefail
  REPO=/vePFS-North-E/vis_robot/workspace/deepdive_kai0
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=$REPO/lmvla/lawam/logs/volc_eval
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/armMpp_recurridge_${STAMP}.log"
  exec >> "$LOG" 2>&1
  set -x
  echo "=== ARM M'' (r-ridge) eval start $(date -u) ==="

  # ---- Python 环境 ----
  export PYTHON=$REPO/kai0/.venv/bin/python
  export PATH=$REPO/kai0/.venv/bin:$PATH
  $PYTHON -c "import torch; print('torch', torch.__version__)"

  # ---- 安装 LIBERO client 依赖(aliyun镜像) ----
  env -u http_proxy -u https_proxy -u HTTP_PROXY -u HTTPS_PROXY -u ALL_PROXY -u all_proxy \
    $PYTHON -m pip install -i https://mirrors.aliyun.com/pypi/simple/ \
    'robosuite==1.4.1' mujoco opencv-python-headless 2>&1 | tail -3
  pip install -i https://mirrors.aliyun.com/pypi/simple/ \
    tyro websockets json-numpy 2>&1 | tail -3 || echo "[warn] some pips failed"

  # ---- 安装 LIBERO(从 North-E 本地源) ----
  LIBERO_SRC=$REPO/lmvla/LIBERO
  if [ -d "$LIBERO_SRC" ]; then
    $PYTHON -m pip install -e "$LIBERO_SRC" 2>&1 | tail -2
  else
    echo "FATAL: LIBERO source not found at $LIBERO_SRC" >&2; exit 13
  fi

  # ---- 修 LIBERO 路径 ----
  # 仓库内 lmvla/LIBERO/libero/config.yaml 从本机同步来, 存的是 /home/tim 绝对路径.
  # eval harness(run_libero_suite_benchmark.sh)读 LIBERO_CONFIG_PATH=$LIBERO_HOME/libero,
  # ensure_libero_eval_config 见 config.yaml 已存在就 return 不重写 -> 直接用绝对 North-E 路径覆盖它.
  # libero 由 eval server 经 PYTHONPATH=$LIBERO_HOME 导入(不走 pip), 故无需装进 kai0/.venv.
  LH=$REPO/lmvla/LIBERO
  mkdir -p "$LH/libero"
  {
    echo "benchmark_root: $LH/libero/libero"
    echo "bddl_files: $LH/libero/libero/bddl_files"
    echo "init_states: $LH/libero/libero/init_files"
    echo "datasets: $LH/libero/libero/../datasets"
    echo "assets: $LH/libero/libero/assets"
  } > "$LH/libero/config.yaml"
  rm -f /root/.libero/config.yaml 2>/dev/null || true
  echo "LIBERO config.yaml -> absolute North-E ($LH/libero/libero)"
  grep -H init_states "$LH/libero/config.yaml"
  [ -f "$LH/libero/libero/init_files/libero_10/LIVING_ROOM_SCENE2_put_both_the_alphabet_soup_and_the_tomato_sauce_in_the_basket.pruned_init" ] \
    && echo "init_files present OK" || echo "FATAL: init_files still missing"

  # ---- 验证 ----
  cd $REPO/lmvla/lawam
  $PYTHON -c "from starVLA.model.framework.vlas.lawam import LatentWorldPolicyBackend; print('Backend OK')"

  # ---- ckpt: r-脊 Arm M'' steps_12500 ----
  LMWM=$REPO/lmvla/lmwm
  CKPT=$REPO/lmvla/lawam/results/Checkpoints/libero/20260716_030632+lmwm_rvalley_recurridge_volc/checkpoints/steps_12500_pytorch_model.pt
  [ -f "$CKPT" ] || { echo "FATAL: ckpt missing $CKPT" >&2; exit 13; }

  export LMWM_CKPT=$LMWM/checkpoints/lmwm_libero_rvalley/lmwm.pt   # r-脊 generator init(与训练一致)
  export LMWM_ADAPTER_DIR=$REPO/lmvla/lawam
  export LMWM_SWAP_TEACHER=1
  unset LMWM_MILESTONE_TARGET LMWM_TARGET_COMPACT                 # 推理不需 target

  export CUDA_VISIBLE_DEVICES=0
  export STAR_VLA_PYTHON=$PYTHON
  export LIBERO_PYTHON=$PYTHON
  export SUITES=libero_10
  export NUM_TRIALS_PER_TASK=50
  export SERVER_STARTUP_TIMEOUT_SEC=600

  echo "[$(date)] preflight OK, starting eval..."
  bash examples/LIBERO/eval_files/auto_eval_scripts/run_libero_benchmark.sh "$CKPT"
  echo "=== ARM M'' (r-ridge) eval DONE $(date -u) ==="

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
