# pi05 Task A new_100 base_mixed1 — volc 8-GPU A100 single node
#
#   Config:  pi05_flatten_fold_a_new_100_base_mixed1
#   Init:    Task_A/mixed_1 (vePFS)
#   Data:    A_new_100 (100 ep originals, no mirror)
#   Spec:    8x A800/A100, batch=128, 50k step, cosine LR 1.5e-5 → 1.5e-6
#   Eta:     ~22h training + 6 inline-eval (each ~40 min) ≈ 26h
#
# Submit:
#   volc ml_task submit -c train_scripts/kai/volc/task_a_new_100_base_mixed1_8gpu.yaml

TaskName: "task-a-new-100-base-mixed1"
Description: "pi05 task_a_new_100_base_mixed1 — 100 ep originals + mixed_1 init + 50k step"
Tags: []

UserCodePath: ""
RemoteMountCodePath: ""

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"

ResourceQueueName: "robot-task"

Framework: "Custom"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"     # 8 GPU A100 + 112 vCPU

ActiveDeadlineSeconds: 172800           # 48 h cap

EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
    IsPrivate: false
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
    IsPrivate: false
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
    IsPrivate: false
  - Name: NCCL_DEBUG
    Value: "WARN"
    IsPrivate: false
  - Name: OMP_NUM_THREADS
    Value: "8"
    IsPrivate: false
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.9"
    IsPrivate: false
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
    IsPrivate: false
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
    IsPrivate: false

Entrypoint: |
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/task_a_new_100_base_mixed1_volc_${STAMP}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) ==="
  set -ex

  echo "[$(date)] node=${MLP_ROLE_INDEX:-0}/${MLP_WORKER_NUM:-1} gpus=${MLP_WORKER_GPU:-8}"
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  echo "KAI0=$KAI0"
  ls -la "$KAI0/.venv/bin/" | head -5
  ls -la "$KAI0/data/Task_A/self_built/A_new_100/" 2>&1 | head -5

  # ---- bootstrap uv + Python 3.11 (container user is root; .venv symlink hard-codes /home/tim) ----
  if [ ! -x "$HOME/.local/bin/uv" ]; then
    curl -LsSf https://astral.sh/uv/install.sh | sh || echo "uv install FAILED"
  fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -3

  # ---- alias root's uv-managed python to /home/tim/ so .venv/bin/python symlink resolves ----
  mkdir -p /home/tim/.local/share
  ln -sfn /root/.local/share/uv /home/tim/.local/share/uv

  # ---- activate vePFS .venv (8.1G, Python 3.11 + jax + torch + lerobot etc.) ----
  cd "$KAI0"
  source .venv/bin/activate
  which python; python --version
  python -c "import torch, jax; print(f'torch {torch.__version__} cuda={torch.cuda.is_available()} jax {jax.__version__} devs={len(jax.devices())}')"

  # ---- launch openpi/JAX training (single-host 8 GPU, FSDP=8) ----
  exec python -u scripts/train.py pi05_flatten_fold_a_new_100_base_mixed1 \
    --exp-name task_a_new_100_new_norm_base_mixed1 \
    --no-wandb-enabled \
    --overwrite

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
