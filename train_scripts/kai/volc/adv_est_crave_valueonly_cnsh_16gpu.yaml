# ⭐ CRAVE value-only 对照臂 — KAI0-AE on crave_stage_poly, robot-task 2×8=16 A100, 50k
#   plan: docs/training/future_plans/plans/crave_polyline_kai_ae_retrain_plan.md §8.7.4
#   Config: ADVANTAGE_TORCH_CRAVE_POLY_VALUEONLY (loss_action=0.0/loss_value=1.0, discrete_state_input=False)
#   Data:   crave_stage_poly (3055ep, CRAVE polyline stage_progress_gt, 视觉驱动非线性)
#   ⭐ 唯一变量 vs ADVANTAGE_TORCH_KAI0_HUMAN_VALUEONLY (Spearman 0.800) = repo_id (CRAVE vs 人工标签)。
#      loss/init/step/bs/norm_stats 逐字段同 → 严格单变量, 终于可答本 plan 原始问题:
#      CRAVE polyline 标签是否比人工标签带来更细致的 value 信息?
#   判据: CRAVE Spearman/frame_discrimination ≥ 人工 0.800/0.150 → CRAVE 标签同等或更优。
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/adv_est_crave_valueonly_cnsh_16gpu.yaml

TaskName: "adv-est-crave-valueonly-cnsh-16gpu"
Description: "CRAVE value-only 对照臂: KAI0-AE on crave_stage_poly, loss_action=0.0. 唯一变量 vs 人工VALUEONLY(Spearman0.800)=repo_id. PyTorch 2x8=16 A100 50k"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"          # injects MLP_WORKER_0_HOST / MLP_WORKER_0_PORT / MLP_WORKER_NUM / MLP_ROLE_INDEX

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 2
    Flavor: "ml.hpcpni2.28xlarge"     # 8× A100-80G per host × 2 = 16 GPU

ActiveDeadlineSeconds: 259200           # 72 h cap

EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: WANDB_MODE
    Value: "offline"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: TORCH_NCCL_BLOCKING_WAIT
    Value: "0"
  - Name: TORCH_NCCL_ASYNC_ERROR_HANDLING
    Value: "1"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/adv_est_crave_valueonly_16gpu_${STAMP}_node${MLP_ROLE_INDEX:-0}.log"
  exec >> "$LOG" 2>&1
  echo "=== CRAVE-AE value-only (crave_stage_poly) train start $(date) node=${MLP_ROLE_INDEX:-0}/${MLP_WORKER_NUM:-2} ==="
  set -ex
  nvidia-smi -L

  export NNODES=${MLP_WORKER_NUM:-2}
  export NODE_RANK=${MLP_ROLE_INDEX:-0}
  export MASTER_ADDR=${MLP_WORKER_0_HOST:-127.0.0.1}
  export MASTER_PORT=${MLP_WORKER_0_PORT:-15853}
  echo "[multinode] nnodes=$NNODES node_rank=$NODE_RANK master=$MASTER_ADDR:$MASTER_PORT"

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  # ⚠️ 必需: .venv_py311_bak/bin/python 是软链→ /home/tim/.local/share/uv/python/cpython-3.11-.../python3.11
  #    (真身在 /vePFS 上但路径挂在 /home/tim 下)。不建这三行链接 → 软链悬空 → "No such file or directory" 秒挂。
  mkdir -p /home/tim/.local/share /root/.local/share
  ln -sfn /vePFS/tim/.local/share/uv /home/tim/.local/share/uv
  ln -sfn /vePFS/tim/.local/share/uv /root/.local/share/uv
  cd "$KAI0"
  # ⚠️ venv 三连坑 (见 memory reference_pytorch_ae_venv):
  #   1) .venv (py3.12) 已被 uv sync 升到 transformers 5.13.1 → AdvantageEstimator transformers_replace check 崩
  #   2) .venv_py311_bak/bin/activate 的 VIRTUAL_ENV 硬编码成 .venv (cp备份残留) → 不能 source
  #   3) .venv_py311_bak/bin/torchrun shebang 硬指 .venv/bin/python3 → 不能直接调 torchrun
  #   ⇒ 必须: 全路径 $VENV/bin/python + `python -m torch.distributed.run`
  VENV=$KAI0/.venv_py311_bak
  apt-get update 2>&1 | tail -1 && apt-get install -y ffmpeg 2>&1 | tail -1 || echo "ffmpeg install skipped"
  $VENV/bin/python -c "import torch, transformers; from transformers.models.siglip import check; assert check.check_whether_transformers_replace_is_installed_correctly(), 'transformers_replace check FAILED — wrong venv'; print(f'torch {torch.__version__} cuda={torch.cuda.is_available()} dev={torch.cuda.device_count()} transformers={transformers.__version__} replace_ok=True')"

  # PRE-FLIGHT (crave_stage_poly: CRAVE polyline stage_progress_gt; videos symlink→kai0_base)
  TRAIN=$KAI0/data/Task_A/self_built/crave_stage_poly
  INIT=$KAI0/checkpoints/pi05_base/pytorch
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: train data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: norm_stats missing $TRAIN" >&2; exit 13; }
  $VENV/bin/python -c "import pyarrow.parquet as pq,glob,sys; f=sorted(glob.glob('$TRAIN/data/chunk-*/*.parquet'))[0]; cols=[c.name for c in pq.read_schema(f)]; sys.exit(0 if 'stage_progress_gt' in cols else 13)" || { echo "FATAL: stage_progress_gt missing" >&2; exit 13; }
  V=$(find -L "$TRAIN/videos/chunk-000/observation.images.top_head" -name '*.mp4' -print -quit 2>/dev/null)
  [ -n "$V" ] && [ -e "$V" ] || { echo "FATAL: crave_stage_poly video symlink 断链" >&2; exit 13; }
  [ -f "$INIT/model.safetensors" ] || { echo "FATAL: pi05_base pytorch init missing $INIT" >&2; exit 13; }
  echo "[$(date)] preflight OK (crave_stage_poly + stage_progress_gt + norm + video + pi05_base)"

  EXP=crave_valueonly
  CKPT_DIR=$KAI0/checkpoints/ADVANTAGE_TORCH_CRAVE_POLY_VALUEONLY/$EXP
  RES=""
  if ls -d "$CKPT_DIR"/[0-9]*/ >/dev/null 2>&1; then RES="--resume"; echo "[resume] found ckpt → --resume"; fi

  exec $VENV/bin/python -m torch.distributed.run \
    --nnodes="$NNODES" --node_rank="$NODE_RANK" --nproc_per_node=8 \
    --master_addr="$MASTER_ADDR" --master_port="$MASTER_PORT" \
    scripts/train_pytorch.py ADVANTAGE_TORCH_CRAVE_POLY_VALUEONLY \
    --exp_name=$EXP \
    --save_interval 10000 \
    --batch-size 144 \
    $RES

RetryOptions:
  EnableRetry: false
