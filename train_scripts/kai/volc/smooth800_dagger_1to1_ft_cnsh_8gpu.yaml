# dagger Exp-B — smooth800+dagger 1:1 微调 (D2, 454ep), cnsh 单节点 8 GPU (A100)
#   Init(resume): smooth800 best ckpt step49999 (≈40k plateau) → 短步 20k 微调
#   Plan: docs/training/future_plans/plans/dagger_validity_and_finetune_comparison.md Exp-B
#   Data: A_smooth800_dagger_1to1 (cnsh vePFS) | Init: task_a_new_smooth_800_step49999 (cnsh vePFS)
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/smooth800_dagger_1to1_ft_cnsh_8gpu.yaml

TaskName: "smooth800-dagger-1to1-ft-cnsh-8gpu"
Description: "dagger Exp-B 1:1微调 (454ep) from smooth800 step49999: JAX 单节点 8 A100, 20k"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G single node

ActiveDeadlineSeconds: 172800
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/smooth800_dagger_1to1_ft_${STAMP}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) (single-node 8 GPU) ==="
  set -ex
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  if [ ! -x "$HOME/.local/bin/uv" ]; then curl -LsSf https://astral.sh/uv/install.sh | sh; fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -2
  mkdir -p /home/tim/.local/share && ln -sfn /root/.local/share/uv /home/tim/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  TRAIN=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_smooth800_dagger_1to1
  INIT=/vePFS/tim/workspace/deepdive_kai0/kai0/checkpoints/task_a_new_smooth_800_step49999/params
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: train data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: norm_stats missing" >&2; exit 13; }
  [ -f "$INIT/_METADATA" ]            || { echo "FATAL: smooth800 init missing $INIT" >&2; exit 13; }
  echo "[$(date)] data + norm_stats + smooth800 init verified"

  # single-node 8 GPU: no JAX multi-host env (train.py uses all 8 local devices, fsdp_devices=8 from config)
  exec python -u scripts/train.py pi05_flatten_fold_A_smooth800_dagger_1to1_ft \
    --exp-name smooth800_dagger_1to1_ft_cnsh \
    --data.repo_id "$TRAIN" \
    --weight-loader.params-path "$INIT" \
    --no-wandb-enabled \
    --overwrite

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
