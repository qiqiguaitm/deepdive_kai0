# AWBC ablation (smooth800-only) — warm-start smooth800 BC, fine-tune on A_smooth800_awbc
#   控制变量 vs pi05_flatten_fold_awbc: 去掉 dagger, 只用 smooth800 的 advantage-labeled 帧 (806 ep, 22%neg/78%pos).
#   测 demo-only 数据的 advantage 信号 (η²≈3% 天花板) 是否够 AWBC 学到东西. plan: awbc_implementation_plan.md.
#   pi05 (advantage in text prompt). cnsh 1-host 8 A100, 50k. data 本地无需传输.
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/pi05_awbc_smooth800only_cnsh_8gpu.yaml

TaskName: "pi05-awbc-smooth800only-cnsh-8gpu"
Description: "AWBC ablation (smooth800-only, no dagger): warm-start smooth800 + advantage-prompt FT: JAX 1-host 8 A100, 50k"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G single node

ActiveDeadlineSeconds: 172800
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/pi05_awbc_smooth800only_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) node=$NODE/${MLP_WORKER_NUM:-1} (1-host 8 A100) ==="
  set -ex
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  if [ ! -x "$HOME/.local/bin/uv" ]; then curl -LsSf https://astral.sh/uv/install.sh | sh; fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -2
  mkdir -p /home/tim/.local/share && ln -sfn /root/.local/share/uv /home/tim/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  # PRE-FLIGHT
  TRAIN=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_smooth800_awbc
  WARM=/vePFS/tim/workspace/deepdive_kai0/kai0/checkpoints/task_a_new_smooth_800_step49999/params
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: AWBC data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: AWBC norm_stats missing" >&2; exit 13; }
  [ -f "$TRAIN/meta/tasks.jsonl" ]    || { echo "FATAL: tasks.jsonl missing (advantage prompts)" >&2; exit 13; }
  [ -f "$WARM/_METADATA" ]            || { echo "FATAL: warm-start ckpt missing $WARM" >&2; exit 13; }
  echo "[$(date)] preflight OK (AWBC smooth800-only data + norm + warm-start verified)"

  exec python -u scripts/train.py pi05_flatten_fold_awbc_smooth800only \
    --exp-name pi05_awbc_smooth800only_cnsh \
    --no-wandb-enabled \
    --overwrite

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 1

AccessType: "Public"
