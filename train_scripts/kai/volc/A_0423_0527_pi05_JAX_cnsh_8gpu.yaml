# A_0423_0527 Run-A — pi05_base init, JAX, 13 dates (排 5-16~5-21 校准漂移), ~1083 ep
#
#   Config:  pi05_flatten_fold_A_0423_0527  (config.py line 1504, init=pi05_base default)
#   Plan:    docs/training/future_plans/plans/A_0423_0527_excl_calibration_drift.md (Run-A)
#   Data:    A_0423_0527 (build by train_scripts/kai/data/build_A_0423_0527.py, ~1083 ep)
#   Val:     vis_v2_merged_val (cross val, 30 ep)
#   Spec:    8 A100-80G single node FSDP, batch=128, 50k step
#   ETA:     ~35-45h
#
# PREREQUISITE: dataset built at /vePFS/.../A_0423_0527/. Verify before submit:
#   ls /vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_0423_0527/meta/episodes.jsonl
#   ls /vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_0423_0527/meta/norm_stats.json
#
# Submit (from gf0):
#   ssh gf0
#   source ~/.volc_creds
#   /vePFS/tim/workspace/deepdive_kai0/kai0/.venv/bin/python \
#     /vePFS/tim/workspace/deepdive_kai0/train_scripts/kai/volc/submit_yaml.py \
#     /vePFS/tim/workspace/deepdive_kai0/train_scripts/kai/volc/A_0423_0527_pi05_JAX_cnsh_8gpu.yaml

TaskName: "a-0423-0527-pi05-jax-cnsh-8gpu"
Description: "Run-A: JAX A_0423_0527 + pi05_base init (排校准漂移 5-16~5-21, ~1083 ep)"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "Custom"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"     # 8× A100-80G + 112 vCPU + 1715 GiB

ActiveDeadlineSeconds: 172800           # 48h cap

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.9"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/A_0423_0527_pi05_JAX_${STAMP}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) ==="
  set -ex
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  cd "$KAI0"

  # venv bootstrap
  if [ ! -x "$HOME/.local/bin/uv" ]; then
    curl -LsSf https://astral.sh/uv/install.sh | sh
  fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -3
  mkdir -p /home/tim/.local/share
  ln -sfn /root/.local/share/uv /home/tim/.local/share/uv
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  # PRE-FLIGHT: verify data + val + init exist (防 5day_recent inline-eval=0 复现)
  TRAIN=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_0423_0527
  VAL=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/vis_v2_merged_val
  INIT=/vePFS/tim/workspace/openpi_cache/openpi-assets/checkpoints/pi05_base/params
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: train data missing $TRAIN — run build_A_0423_0527.py first" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ] || { echo "FATAL: norm_stats missing $TRAIN/norm_stats.json — run compute_norm_states_fast.py first" >&2; exit 13; }
  [ -f "$VAL/meta/episodes.jsonl" ] || { echo "FATAL: val data missing $VAL" >&2; exit 13; }
  [ -d "$INIT" ] || { echo "FATAL: pi05_base init missing $INIT" >&2; exit 13; }
  echo "[$(date)] all data + init verified"

  # Launch JAX FSDP=8
  exec python -u scripts/train.py pi05_flatten_fold_A_0423_0527 \
    --exp-name A_0423_0527_pi05_JAX \
    --no-wandb-enabled \
    --resume

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
