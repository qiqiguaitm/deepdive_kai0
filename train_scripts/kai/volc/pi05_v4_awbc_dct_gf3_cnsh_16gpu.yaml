# Mode B §8 任务③ — tszn6(control 2006ep) + DCT: 隔离 DCT 效果 + 量化抖动平滑收益
#   plan: pi05_v4_awbc_modeB_freeze_diagnosis_plan.md §8
#   Config: pi05_v4_awbc_dct (已注册, use_dct_loss=True, 与 tszn6 唯一差=DCT)
#   Data: A_v4_base_dagger (2006ep pruned, 与 tszn6 完全相同, repo_id 直接指)
#   Init: pi05_base (冷启动, 与 tszn6 同). exp=pi05_v4_awbc_dct_gf3 独立.
#   16卡 JAX 多机加速. 判据: Mode B 冻结(预期冻) + Mode A 平滑度(vs tszn6).
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/pi05_v4_awbc_dct_gf3_cnsh_16gpu.yaml
TaskName: "pi05-v4-awbc-dct-gf3-cnsh-16gpu"
Description: "Mode B §8 任务③: tszn6+DCT(隔离 DCT 效果+量化平滑), pi05_v4_awbc_dct on A_v4_base_dagger(2006ep), JAX 2×8 A100 50k"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 2
    Flavor: "ml.hpcpni2.28xlarge"

ActiveDeadlineSeconds: 345600
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/pi05_v4_awbc_dct_gf3_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== 任务③ DCT-gf3 start $(date) node=$NODE/${MLP_WORKER_NUM:-2} ==="
  set -ex
  nvidia-smi -L
  echo "[multinode] host0=${MLP_WORKER_0_HOST} num=${MLP_WORKER_NUM} idx=${MLP_ROLE_INDEX}"

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  if [ ! -x "$HOME/.local/bin/uv" ]; then curl -LsSf https://astral.sh/uv/install.sh | sh; fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -2
  mkdir -p /home/tim/.local/share && ln -sfn /root/.local/share/uv /home/tim/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate

  export JAX_COORDINATOR_ADDRESS="${MLP_WORKER_0_HOST}:15830"
  export JAX_NUM_PROCESSES="${MLP_WORKER_NUM:-2}"
  export JAX_PROCESS_INDEX="${MLP_ROLE_INDEX:-0}"
  echo "[jax-dist] coord=$JAX_COORDINATOR_ADDRESS nproc=$JAX_NUM_PROCESSES idx=$JAX_PROCESS_INDEX"

  TRAIN=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_v4_base_dagger
  INIT=/vePFS/tim/workspace/openpi_cache/openpi-assets/checkpoints/pi05_base/params
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: data missing"; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ] || { echo "FATAL: norm missing"; exit 13; }
  grep -q "Advantage: positive" "$TRAIN/meta/tasks.jsonl" || { echo "FATAL: tasks.jsonl 缺 advantage prompt"; exit 13; }
  [ -f "$INIT/_METADATA" ] || { echo "FATAL: init missing"; exit 13; }
  echo "[$(date)] preflight OK (tszn6 data 2006ep + DCT + pi05_base)"

  EXP=pi05_v4_awbc_dct_gf3
  CKPT_DIR=$KAI0/checkpoints/pi05_v4_awbc_dct/$EXP
  if ls -d "$CKPT_DIR"/[0-9]*/ >/dev/null 2>&1; then
    RESUME_FLAG="--resume"; echo "[resume] found ckpt -> --resume"
  else
    RESUME_FLAG="--overwrite"; echo "[resume] no ckpt -> fresh --overwrite"
  fi

  exec python -u scripts/train.py pi05_v4_awbc_dct \
    --exp-name pi05_v4_awbc_dct_gf3 \
    --no-wandb-enabled \
    $RESUME_FLAG

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 1

AccessType: "Public"
