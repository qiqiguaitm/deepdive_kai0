# A_mirror200_pi05_pytorch — pure_200 PyTorch native training (1:1 vs JAX SOTA)
#
#   Config:  pi05_pytorch_a_new_pure_200  (line 1466 in kai0/src/openpi/training/config.py)
#   Data:    A_new_pure_200 (200 ep + hflip mirror, ~150K frames) on cnsh vePFS
#   Val:     A_new_pure_200_val (20 ep, native)
#   Init:    pi05_base via pytorch_weight_path
#   Spec:    8 A100-80G single node FSDP, bf16, batch=128, 50k step
#   ETA:     ~30-50h (PyTorch 一般 2-3× slower than JAX)
#
# Submit (from gf0):
#   ssh gf0
#   source ~/.volc_creds
#   /vePFS/tim/workspace/deepdive_kai0/kai0/.venv/bin/python \
#     /vePFS/tim/workspace/deepdive_kai0/train_scripts/kai/volc/submit_yaml.py \
#     /vePFS/tim/workspace/deepdive_kai0/train_scripts/kai/volc/A_mirror200_pi05_pytorch_cnsh_8gpu.yaml

TaskName: "a-mirror200-pi05-pytorch-cnsh-8gpu"
Description: "PyTorch native pure_200 (1:1 vs JAX SOTA task_a_new_pure_200_new_norm MAE@1=0.0065)"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"     # 8× A100-80G + 112 vCPU + 1715 GiB

ActiveDeadlineSeconds: 259200           # 72 h cap (PyTorch 慢, 留 buffer)

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: PYTHONUNBUFFERED
    Value: "1"
  # PYTORCH_CUDA_ALLOC_CONF + TORCH_DDP_MASTER_PORT 是 v6 Completed run 验证 work 的关键 env
  # (v1-v5 没设, 跟我们这个 SIGSEGV 一样 fail). 见 t-20260525002413-2dk7s 对照.
  - Name: PYTORCH_CUDA_ALLOC_CONF
    Value: "max_split_size_mb:128,expandable_segments:True"
  - Name: TORCH_DDP_MASTER_PORT
    Value: "15830"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: WANDB_MODE
    Value: "offline"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/A_mirror200_pi05_pytorch_${STAMP}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) ==="
  set -ex

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0

  # ---- venv bootstrap: symlink vePFS-staged uv (v6 Completed pattern) ----
  # 容器无 /home/tim, 把它 symlink 到 vePFS 已 stage 好的 uv (不要 fresh install)
  mkdir -p /home/tim/.local/share /root/.local/share
  ln -sfn /vePFS/tim/.local/share/uv /home/tim/.local/share/uv
  ln -sfn /vePFS/tim/.local/share/uv /root/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate
  apt-get update 2>&1 | tail -1 && apt-get install -y ffmpeg 2>&1 | tail -2 || echo "ffmpeg install failed"
  python --version
  python -c "import torch; print(f'torch {torch.__version__} cuda={torch.cuda.is_available()} dev={torch.cuda.device_count()}')"

  # ---- PRE-FLIGHT: verify val data exists (5day_recent inline-eval=0 教训) ----
  VAL=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_new_pure_200_val
  if [ ! -f "$VAL/meta/episodes.jsonl" ]; then
    echo "FATAL: val data missing at $VAL — abort to avoid silent inline-eval=0" >&2
    exit 13
  fi
  echo "[$(date)] val OK: $(wc -l < $VAL/meta/episodes.jsonl) episodes"

  # ---- PRE-FLIGHT: verify train data + init weights exist ----
  TRAIN=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_new_pure_200
  INIT=/vePFS/tim/workspace/openpi_cache/modelscope_cache/lerobot/pi05_base
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: train data missing $TRAIN" >&2; exit 13; }
  [ -f "$INIT/model.safetensors" ] || { echo "FATAL: pytorch init weights missing $INIT" >&2; exit 13; }
  echo "[$(date)] all data + init verified, launching torchrun"

  # ---- launch PyTorch DDP (single-host 8 GPU, v6 pattern) ----
  # v6 用 --master_addr/--master_port 而非 --standalone (single-node 也能跑, 更稳)
  MASTER_PORT="${TORCH_DDP_MASTER_PORT:-15830}"
  exec torchrun \
    --nnodes=1 \
    --node_rank=0 \
    --nproc_per_node=8 \
    --master_addr=127.0.0.1 \
    --master_port=$MASTER_PORT \
    scripts/train_pytorch.py pi05_pytorch_a_new_pure_200 \
    --exp_name A_mirror200_pi05_pytorch \
    --save_interval 2000

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
