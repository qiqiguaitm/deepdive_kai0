# ⭐ 复现原始 adv_est_v1 配方: value-only 人工标签 — KAI0-AE on kai0_advantage, robot-task 2×8=16 A100, 50k
#   plan: docs/training/future_plans/plans/crave_polyline_kai_ae_retrain_plan.md §8.7 + memory project_pytorch_ae_deadvalue_not_code_regression
#   Config: ADVANTAGE_TORCH_KAI0_HUMAN_VALUEONLY (AdvantageEstimatorConfig, loss_action=0.0/loss_value=1.0, discrete_state_input=False)
#   Data:   kai0_advantage (3055ep, 人工 stage_progress_gt) = data/Task_A/advantage (adv_est_v1 原始训练集)
#   ⭐ 唯一变量 vs 已 dead 的 ADVANTAGE_TORCH_KAI0_HUMAN_MT = loss_action 1.0→0.0 (回到原始 value-only).
#   判据: value corr 高(复现 adv_est_v1 0.93) → 多任务切换是回归源, value-only 才对; 若也 dead → eval口径/数据本质.
#   16卡 (2 节点 × 8 A100); PyTorch DDP multinode (torchrun rendezvous).
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/adv_est_kai0_valueonly_cnsh_16gpu.yaml

TaskName: "adv-est-kai0-valueonly-cnsh-16gpu"
Description: "复现原始adv_est_v1配方: KAI0-AE value-only(loss_action=0.0) on kai0_advantage. 唯一变量 vs 已dead的HUMAN_MT=loss_action 1→0. PyTorch 2x8=16 A100 50k"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"          # injects MLP_WORKER_0_HOST / MLP_WORKER_0_PORT / MLP_WORKER_NUM / MLP_ROLE_INDEX

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 2
    Flavor: "ml.hpcpni2.28xlarge"     # 8× A100-80G per host × 2 = 16 GPU

ActiveDeadlineSeconds: 259200           # 72 h cap

EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: WANDB_MODE
    Value: "offline"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: TORCH_NCCL_BLOCKING_WAIT
    Value: "0"
  - Name: NCCL_ASYNC_ERROR_HANDLING
    Value: "1"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/adv_est_kai0_valueonly_16gpu_${STAMP}_node${MLP_ROLE_INDEX:-0}.log"
  exec >> "$LOG" 2>&1
  echo "=== KAI0-AE value-only repro (kai0_advantage) train start $(date) node=${MLP_ROLE_INDEX:-0}/${MLP_WORKER_NUM:-2} ==="
  set -ex
  nvidia-smi -L

  export NNODES=${MLP_WORKER_NUM:-2}
  export NODE_RANK=${MLP_ROLE_INDEX:-0}
  export MASTER_ADDR=${MLP_WORKER_0_HOST:-127.0.0.1}
  export MASTER_PORT=${MLP_WORKER_0_PORT:-15852}
  echo "[multinode] nnodes=$NNODES node_rank=$NODE_RANK master=$MASTER_ADDR:$MASTER_PORT"

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  mkdir -p /home/tim/.local/share /root/.local/share
  ln -sfn /vePFS/tim/.local/share/uv /home/tim/.local/share/uv
  ln -sfn /vePFS/tim/.local/share/uv /root/.local/share/uv
  cd "$KAI0"
  # ⚠️ .venv (py3.12) 已被 uv sync 升级到 transformers 5.13.1 → AdvantageEstimator transformers_replace check 失败
  #    (07-16 human_mt 跑通时 .venv 还是 4.53.2)。用 .venv_py311_bak (transformers 4.53.2 + patch, 当年working venv)。
  #    ⚠️ 不能 source .venv_py311_bak/bin/activate —— 该 activate 的 VIRTUAL_ENV 被硬编码成 .venv(cp备份没改路径),
  #    会激活错的 .venv。必须直接全路径调 bin。
  VENV=$KAI0/.venv_py311_bak
  apt-get update 2>&1 | tail -1 && apt-get install -y ffmpeg 2>&1 | tail -1 || echo "ffmpeg install skipped"
  $VENV/bin/python -c "import torch, transformers; from transformers.models.siglip import check; assert check.check_whether_transformers_replace_is_installed_correctly(), 'transformers_replace check FAILED — wrong venv'; print(f'torch {torch.__version__} cuda={torch.cuda.is_available()} dev={torch.cuda.device_count()} transformers={transformers.__version__} replace_ok=True')"

  # PRE-FLIGHT (kai0_advantage 人工标签; norm←自带; videos 自带)
  TRAIN=$KAI0/data/Task_A/kai0_advantage
  INIT=/vePFS/tim/workspace/deepdive_kai0/kai0/checkpoints/pi05_base/pytorch
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: train data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: norm_stats missing $TRAIN" >&2; exit 13; }
  $VENV/bin/python -c "import pyarrow.parquet as pq,glob,sys; f=sorted(glob.glob('$TRAIN/data/chunk-*/*.parquet'))[0]; cols=[c.name for c in pq.read_schema(f)]; sys.exit(0 if 'stage_progress_gt' in cols else 13)" || { echo "FATAL: stage_progress_gt missing" >&2; exit 13; }
  V=$(find -L "$TRAIN/videos/chunk-000/observation.images.top_head" -name '*.mp4' -print -quit 2>/dev/null)
  [ -n "$V" ] && [ -e "$V" ] || { echo "FATAL: kai0_advantage video 断链" >&2; exit 13; }
  [ -f "$INIT/model.safetensors" ] || { echo "FATAL: pi05_base pytorch init missing $INIT" >&2; exit 13; }
  echo "[$(date)] preflight OK (kai0_advantage + stage_progress_gt + norm + video + pi05_base)"

  EXP=kai0_valueonly
  CKPT_DIR=$KAI0/checkpoints/ADVANTAGE_TORCH_KAI0_HUMAN_VALUEONLY/$EXP
  RES=""
  if ls -d "$CKPT_DIR"/[0-9]*/ >/dev/null 2>&1; then RES="--resume"; echo "[resume] found ckpt → --resume"; fi

  # ⚠️ 不能用 $VENV/bin/torchrun —— 其 shebang 硬指 .venv/bin/python3(cp备份残留) → worker 又跑错 venv。
  #    用 $VENV/bin/python -m torch.distributed.run: bak python 直接跑, worker 继承 sys.executable=bak python(4.53.2)。
  exec $VENV/bin/python -m torch.distributed.run \
    --nnodes="$NNODES" --node_rank="$NODE_RANK" --nproc_per_node=8 \
    --master_addr="$MASTER_ADDR" --master_port="$MASTER_PORT" \
    scripts/train_pytorch.py ADVANTAGE_TORCH_KAI0_HUMAN_VALUEONLY \
    --exp_name=$EXP \
    --save_interval 10000 \
    --batch-size 144 \
    $RES

RetryOptions:
  EnableRetry: false
