# XVLA E0 v1 official — FIXEDCAM 重训 (视频路径 bug 修复后, 真实图, 非黑图) — cnsh 8 GPU 50k
#   背景: 旧 xvla_e0_v1_official 训在黑图上 (LeRobotEE6DDataset._video_path 全名/短名目录不匹配 →
#         av.open 失败 → except 静默黑图)。已修 _video_path (先试全名退短名) + 解码失败大声 warn。
#         2k smoke (xvla-e0-smoke2k-fixedcam) 已确认 0 black-fallback + loss 健康轨迹。
#   配方与旧 E0 完全一致 (官方): bf16 | wd=0 | 4 param groups | freeze vlm+core 前1000步 |
#         constant LR + warmup2000 | lr 1e-4 | 50k | per-device 16 (eff 128) | qdur2.0 | ImageNet+ColorJitter。
#   唯一变化: loader 修好 → 真实图; 独立 OUT (不覆盖作废的黑图 ckpt)。
#   判据: 训完跑 eval_xvla_vision_ablation_dataset.py (修好的 loader), d_img 0.00→≳0.5×d_state (或绝对≳10mm) = 读视觉, 根因坐实修复。
#   Data: A_v1_noRelabel_ee6d/<6 dates> (vePFS) | Init: xvla_ckpts (vePFS)
#   Plan: docs/training/future_plans/plans/xvla_proprio_shortcut_openloop_fix.md (§0 2026-06-23 banner)
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/xvla_e0_v1_official_fixedcam_cnsh_8gpu.yaml
TaskName: "xvla-e0-v1-official-fixedcam-cnsh-8gpu"
Description: "E0 官方配方 v1 真实图 (视频路径修复后重训): torch DDP 8 A100, 50k, bf16, 4group, constant LR, bs16/gpu"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G single node

ActiveDeadlineSeconds: 259200
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/xvla_e0_v1_official_fixedcam_${STAMP}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) ==="
  set -x
  nvidia-smi -L
  VENV=/vePFS/tim/workspace/deepdive_kai0/xvla/X-VLA-env/.venv
  XVLA_SB_DIR=/vePFS/tim/workspace/deepdive_kai0/xvla/data/self_built
  INIT=/vePFS/tim/workspace/deepdive_kai0/xvla/xvla_ckpts
  OUT=/vePFS/tim/workspace/deepdive_kai0/xvla/ckpts/xvla_e0_v1_official_fixedcam
  mkdir -p "$OUT"
  export XVLA_SB="$XVLA_SB_DIR"
  export XVLA_CKPT_INIT="$INIT"
  export XVLA_BART_TOK=/vePFS/tim/workspace/deepdive_kai0/xvla/assets/bart-large-tokenizer

  "$VENV/bin/python" -c "import torch; from lerobot.policies.xvla.modeling_xvla import XVLAPolicy; print('venv OK torch', torch.__version__, 'cuda', torch.cuda.is_available(), 'ngpu', torch.cuda.device_count())"
  [ -f "$XVLA_SB_DIR/A_v1_noRelabel_ee6d/2026-04-23/meta/info.json" ] || { echo "FATAL: data missing" >&2; exit 13; }
  [ -f "$INIT/config.json" ]                                          || { echo "FATAL: init missing" >&2; exit 13; }
  [ -f "$XVLA_BART_TOK/tokenizer.json" ]                              || { echo "FATAL: bart tokenizer missing $XVLA_BART_TOK" >&2; exit 13; }
  "$VENV/bin/python" -c "import os; from transformers import AutoTokenizer; AutoTokenizer.from_pretrained(os.environ['XVLA_BART_TOK']); print('bart tokenizer offline OK')"
  echo "[$(date)] preflight OK"

  cd /vePFS/tim/workspace/deepdive_kai0/train_scripts/xvla/launch
  "$VENV/bin/python" -m torch.distributed.run --standalone --nproc_per_node=8 xvla_train.py \
    --config E0_v1_official \
    --output_dir "$OUT" \
    --workers 4
  RC=$?
  echo "=== train exit code: $RC ==="
  echo "=== BLACK-IMAGE FALLBACK CHECK (期望 0) ==="
  echo "black-image fallback warnings: $(grep -c 'black-image fallback' "$LOG" || true)"
  exit $RC

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 1

AccessType: "Public"
