# 【可复用】LIBERO-10 双 ckpt × 4 路并行重复评测 — 北京 Robot-North-H20 8×H20 整节点
#   ckptA → GPU 0-3(4 路), ckptB → GPU 4-7(4 路), 一个任务把 8 张卡用满。
#   每 ckpt 的 LMWM env 在各自子 shell 内 export, 互不污染(架构相关, 配错=state_dict size mismatch)。
#
# 本次实例: Job1 = armB_baseline(LaWM, 无注入) + no-WM(纯VLA, future_prediction=false 由 config.json 恢复)
# 用法: 改 ★ 段, 然后 gsy 上 submit_yaml.py libero_eval_2ckpt_x4_8h20.yaml

TaskName: "libero-eval-dual2q-hintdrop-x4"
Description: "dual2q(12500) + hintdrop015(12500) 各4路变seed重复评测"
Tags: []

ImageUrl: "dvs-cr-cn-beijing.cr.volces.com/vis_robot/kai:kai0-gf1"
ResourceQueueName: "Robot-North-H20"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni3ln.45xlarge"   # 8×H20 整节点(队列不支持 FlexibleResourceClaim; 单卡档为 ml.pni3ln.5xlarge)

ActiveDeadlineSeconds: 28800
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnbj875793a96d6b"
    MountPath: "/vePFS-North-E/vis_robot"
    SubPath: "/vis_robot"

CacheType: "Cloudfs"

Envs:
  - Name: PYTHONUNBUFFERED
    Value: "1"
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: MUJOCO_GL
    Value: "egl"

Entrypoint: |
  set -uo pipefail
  REPO=/vePFS-North-E/vis_robot/workspace/deepdive_kai0
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=$REPO/lmvla/lawam/logs/volc_eval
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/eval2x4job2_${STAMP}.log"
  exec >> "$LOG" 2>&1
  set -x
  echo "=== 双ckpt×4路 重复评测 start $(date -u) ==="

  CK=$REPO/lmvla/lawam/results/Checkpoints/libero
  # ★ ckptA(GPU 0-3)
  CKPT_A=$CK/20260718_111535+lmwm_dual_2q_cnsh_volc/checkpoints/steps_12500_pytorch_model.pt
  GROUP_A=dual2q_12500_x4
  # ★ ckptB(GPU 4-7)
  CKPT_B=$CK/20260717_024128+lmwm_hintdrop015_cnsh_volc/checkpoints/steps_12500_pytorch_model.pt
  GROUP_B=hintdrop015_12500_x4
  NREP=4

  export PYTHON=$REPO/kai0/.venv/bin/python
  export PATH=$REPO/kai0/.venv/bin:$PATH
  export STAR_VLA_PYTHON=$PYTHON
  export LIBERO_PYTHON=$PYTHON
  cd $REPO/lmvla/lawam
  nvidia-smi -L | head -8

  for f in "$CKPT_A" "$CKPT_B"; do
    [ -f "$f" ] || { echo "FATAL: ckpt 不存在 $f" >&2; exit 13; }
  done
  # from_pretrained -> read_mode_config(share_tools.py:97) 断言 run_dir(=ckpt.parents[1]) 下必须有
  #   config.yaml + dataset_statistics.json。注意**不是 config.json**(2026-07-19 踩过: 只传 config.json
  #   导致 8 路全部 "Missing config.yaml" 起不来, 空跑 23min 才发现)。
  for d in "$(dirname $(dirname $CKPT_A))" "$(dirname $(dirname $CKPT_B))"; do
    for f in config.yaml dataset_statistics.json; do
      [ -f "$d/$f" ] || { echo "FATAL: 缺 $d/$f (from_pretrained 必需)" >&2; exit 13; }
    done
  done

  # ---- 环境自愈(幂等) ----
  env -u http_proxy -u https_proxy -u HTTP_PROXY -u HTTPS_PROXY -u ALL_PROXY -u all_proxy \
    $PYTHON -m pip install -q -i https://mirrors.aliyun.com/pypi/simple/ \
    'robosuite==1.4.1' mujoco opencv-python-headless tyro websockets json-numpy 2>&1 | tail -2
  LH=$REPO/lmvla/LIBERO
  mkdir -p "$LH/libero"
  {
    echo "benchmark_root: $LH/libero/libero"
    echo "bddl_files: $LH/libero/libero/bddl_files"
    echo "init_states: $LH/libero/libero/init_files"
    echo "datasets: $LH/libero/libero/../datasets"
    echo "assets: $LH/libero/libero/assets"
  } > "$LH/libero/config.yaml"
  rm -f /root/.libero/config.yaml 2>/dev/null || true
  $PYTHON -c "from starVLA.model.framework.vlas.lawam import LatentWorldPolicyBackend; print('Backend OK')"

  export SUITES=libero_10
  export NUM_TRIALS_PER_TASK=50
  export NUM_WORKERS=25
  export SERVER_STARTUP_TIMEOUT_SEC=1200
  export OUTPUT_ROOT=$REPO/lmvla/lawam/results/eval_runs/libero
  echo "[$(date)] preflight OK"

  pids=""
  # ---- ckptA: GPU 0-3 ----
  for i in $(seq 0 $((NREP-1))); do
    (
      # ★A: dual2q = LaWM∥LMWM 并联双query(DUAL/DUAL_2Q 改 num_action_queries+投影头, 架构相关必设)
      unset LMWM_MILESTONE_TARGET LMWM_TARGET_COMPACT LMWM_MS_TSCHED LMWM_HINT_DROPOUT
      export LMWM_CKPT=$REPO/lmvla/lmwm/checkpoints/lmwm_libero_rvalley/lmwm.pt
      export LMWM_ADAPTER_DIR=$REPO/lmvla/lawam
      export LMWM_SWAP_TEACHER=1
      export LMWM_DUAL=1
      export LMWM_DUAL_2Q=1
      export GPU_IDS=$i EVAL_GPU_IDS=$i
      export PORT_BASE=$((5694 + i*20))
      export EVAL_SEED=$i          # ★ 每路不同 seed → 真独立样本(同 seed 近确定性, 误差棒是假的)
      export LIBERO_RUN_GROUP=$GROUP_A RUN_TAG=seed$i
      echo "[A/seed$i] GPU=$i 启动"
      bash examples/LIBERO/eval_files/auto_eval_scripts/run_libero_benchmark.sh "$CKPT_A"
    ) > "$LOG_DIR/eval2x4job2_${STAMP}_A_rep${i}.log" 2>&1 &
    pids="$pids $!"; sleep 15
  done
  # ---- ckptB: GPU 4-7 ----
  for i in $(seq 0 $((NREP-1))); do
    g=$((i+4))
    (
      # ★B: hintdrop015 = LMWM 替换(单通道 swap teacher), 不加 DUAL/DUAL_2Q
      unset LMWM_DUAL LMWM_DUAL_2Q LMWM_MILESTONE_TARGET LMWM_TARGET_COMPACT LMWM_MS_TSCHED LMWM_HINT_DROPOUT
      export LMWM_CKPT=$REPO/lmvla/lmwm/checkpoints/lmwm_libero_rvalley/lmwm.pt
      export LMWM_ADAPTER_DIR=$REPO/lmvla/lawam
      export LMWM_SWAP_TEACHER=1
      export GPU_IDS=$g EVAL_GPU_IDS=$g
      export PORT_BASE=$((5694 + g*20))
      export EVAL_SEED=$i          # ★ 每路不同 seed
      export LIBERO_RUN_GROUP=$GROUP_B RUN_TAG=seed$i
      echo "[B/seed$i] GPU=$g 启动"
      bash examples/LIBERO/eval_files/auto_eval_scripts/run_libero_benchmark.sh "$CKPT_B"
    ) > "$LOG_DIR/eval2x4job2_${STAMP}_B_rep${i}.log" 2>&1 &
    pids="$pids $!"; sleep 15
  done

  echo "[$(date)] 已起 8 路: $pids"
  for p in $pids; do wait $p; done
  echo "[$(date)] 全部结束"

  export GROUP_A GROUP_B
  $PYTHON - <<'PYEOF'
  import json, glob, os
  from collections import defaultdict
  import statistics as st
  root = os.environ["OUTPUT_ROOT"]
  for group in (os.environ["GROUP_A"], os.environ["GROUP_B"]):
      reps = []
      for f in sorted(glob.glob(f"{root}/{group}/seed*/suites/libero_10/episodes.jsonl")):
          s = defaultdict(list)
          for line in open(f):
              d = json.loads(line); s[d["task_id"]].append(bool(d["success"]))
          tot = sum(len(v) for v in s.values()); ns = sum(sum(v) for v in s.values())
          if tot == 0: continue
          reps.append((f.split("/suites/")[0].split("/")[-1], ns/tot*100, tot,
                       {k: sum(v)/len(v)*100 for k, v in s.items()}))
      print(f"\n============ {group} ({len(reps)} 路) ============")
      for tag, agg, tot, per in reps:
          print(f"  {tag}: agg={agg:.1f} (n={tot}) | " + " ".join(f"t{k}={per[k]:.0f}" for k in sorted(per)))
      if len(reps) >= 2:
          aggs = [r[1] for r in reps]
          print(f"  聚合 均值={st.mean(aggs):.2f} std={st.pstdev(aggs):.2f} 范围=[{min(aggs):.1f},{max(aggs):.1f}]")
          for k in sorted(reps[0][3]):
              vs = [r[3].get(k, float('nan')) for r in reps]
              print(f"    t{k}: 均值={st.mean(vs):5.1f} std={st.pstdev(vs):4.1f} 范围=[{min(vs):.0f},{max(vs):.0f}]")
  print()
  PYEOF

  echo "=== 双ckpt×4路 重复评测 DONE $(date -u) ==="

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
