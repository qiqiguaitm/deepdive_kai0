  $PYTHON -c "import torch;print(''torch'',torch.__version__)"

  ls $LMVLA_LIBERO_ROOT/data >/dev/null && echo "数据集可达"

  '
RetryOptions:
  EnableRetry: false
  MaxRetryTimes: 0
