# v2v3 data_window_scaling Exp-D — v3 排除嫌疑窗 5-19~5-27 (≤5-18 排5-16 + 5-28 = 1335 ep)
#   8卡(单节点)版 — 16卡 H20 配额不足,降到 1-host×8 H20 绕开排队 (fsdp_devices=8 config 本就单机友好)
#
#   Config:   pi05_flatten_fold_v3_excl_0519_0527  (config.py, fsdp_devices=8, batch128)
#   Plan:     docs/training/future_plans/plans/v2v3_data_window_scaling_experiments.md Exp-D
#   Data:     A_v3_excl_0519_0527 (1335 ep) — entrypoint 内 node-0 build (合并 13 个 v3 日期)
#   Hypo:     验证"之前 v3 训练问题源于混入 5-19~5-27 脏数据" → 本实验排除该窗
#   Init:     mixed_1_clean (cnbj vePFS, 22G)
#   Spec:     1-host × 8 H20 = 8 GPU FSDP, batch 128, 50k step (~2× 16卡墙钟, deadline 48h 够)
#
# Submit (VOLC_REGION=cn-beijing 必须!): source ~/.volc_creds && VOLC_REGION=cn-beijing \
#   kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/v3_excl_0519_0527_cnbj_8gpu.yaml

TaskName: "v3-excl-0519-0527-cnbj-8gpu"
Description: "Exp-D v3 排除5-19~5-27 (1335ep): JAX 1-host 8 H20, mixed_1_clean init, 50k; node-0 in-pod build"
Tags: []

ImageUrl: "dvs-cr-cn-beijing.cr.volces.com/vis_robot/kai:kai0-gf1"
ResourceQueueName: "Robot-North-H20"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni3ln.45xlarge"   # 8× H20-SXM5-96GB per host × 1 = 8 GPU

ActiveDeadlineSeconds: 172800
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnbj875793a96d6b"
    MountPath: "/vePFS-North-E/vis_robot"
    SubPath: "/vis_robot"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  echo "=== PREFLIGHT $(date) node=$NODE host=$(hostname) ==="
  ls -ld /vePFS-North-E/vis_robot 2>&1 || echo "MOUNT-MISSING"
  LOG_DIR=/vePFS-North-E/vis_robot/logs
  mkdir -p "$LOG_DIR" 2>&1 || echo "MKDIR-FAILED"
  LOG="$LOG_DIR/v3_excl_0519_0527_8gpu_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) node=$NODE/${MLP_WORKER_NUM:-1} (1-host 8 GPU) ==="
  set -x
  nvidia-smi -L

  REPO=/vePFS-North-E/vis_robot/workspace/deepdive_kai0
  cd "$REPO/kai0"
  ls -la .venv/bin/python
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  TRAIN=$REPO/kai0/data/Task_A/self_built/A_v3_excl_0519_0527
  INIT=/vePFS-North-E/vis_robot/shared_ckpt/Task_A/mixed_1_clean/params

  # --- node-0: build 合并数据集 (排除 5-19~5-27) if missing ---
  if [ "$NODE" = "0" ]; then
    if [ ! -f "$TRAIN/norm_stats.json" ]; then
      echo "[build] $(date) building A_v3_excl_0519_0527 (13 v3 dates, excl 5-16/5-19~5-27)"
      rm -rf "$TRAIN"
      python "$REPO/train_scripts/kai/data/build_no_release.py" \
        --mode raw --merge-src v3 --merge-out A_v3_excl_0519_0527 \
        --merge-dates 2026-04-23-v3 2026-04-24-v3 2026-04-25-v3 2026-04-28-v3 \
                      2026-04-29-v3 2026-04-30-v3 2026-05-06-v3 2026-05-07-v3 \
                      2026-05-08-v3 2026-05-09-v3 2026-05-10-v3 2026-05-18-v3 2026-05-28-v3 \
        || { echo "FATAL: build failed" >&2; exit 13; }
    fi
    [ -f "$TRAIN/norm_stats.json" ] || { echo "FATAL: norm_stats missing after build" >&2; exit 13; }
    EP=$(python -c "import json;print(json.load(open('$TRAIN/meta/info.json'))['total_episodes'])" 2>/dev/null || echo "?")
    echo "[build] done $(date) episodes=$EP (期望 1335)"
    touch "$TRAIN/.build_done"
  fi

  # --- 等 build sentinel (单机 node-0 自建, 立即就绪; max ~2h) ---
  for i in $(seq 1 720); do [ -f "$TRAIN/.build_done" ] && break; echo "[wait-build $i] $(date)"; sleep 10; done

  # PRE-FLIGHT (build 失败则在此安全退出, 不浪费训练)
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: train data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: norm_stats missing $TRAIN/norm_stats.json" >&2; exit 13; }
  [ -f "$INIT/_METADATA" ]            || { echo "FATAL: mixed_1_clean init missing $INIT" >&2; exit 13; }
  echo "[$(date)] data + norm_stats + init verified"

  # 单节点: 不设 JAX 多机 coordinator (train.py 自动用本机 8 GPU)
  exec python -u scripts/train.py pi05_flatten_fold_v3_excl_0519_0527 \
    --exp-name v3_excl_0519_0527_cnbj_8gpu \
    --data.repo_id "$TRAIN" \
    --weight-loader.params-path "$INIT" \
    --no-wandb-enabled \
    --overwrite

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 1

AccessType: "Public"
