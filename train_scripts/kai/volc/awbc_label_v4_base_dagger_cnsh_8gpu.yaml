# AWBC Stage-2 labeling — run the trained Advantage Estimator over A_smooth800_dagger_all (1119ep/1.59M frames)
#   cnsh 2-host × 8 A100 = 16 workers (eval.py shards ep%16); each GPU runs 1 worker (1 model copy).
#   Torch (PyTorch_Custom=AdvantageEstimator), cv2 video. Output: <ds>/data_KAI0_100000/chunk-000/episode_*.parquet
#   (NOT JAX multi-host — embarrassingly parallel, no coordinator). Estimator+data on cnsh (zero staging).
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/awbc_label_smooth800_dagger_all_cnsh_16gpu.yaml

TaskName: "awbc-label-v4-base-dagger-cnsh-8gpu"
Description: "AWBC v4 Stage2: adv_est_v1 打标 A_v4_base_dagger (1994ep/2.37M), devq 1-host 8 A100, ep%8 shard"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "Robot-GPU开发机队列"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G per host × 2 = 16 workers

ActiveDeadlineSeconds: 86400
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  NUMNODES=${MLP_WORKER_NUM:-2}
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/awbc_label_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== AWBC labeling start $(date) node=$NODE/$NUMNODES ==="
  set -x
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0

  # ---- bootstrap uv + Python 3.11 (root user; .venv python symlink hardcodes /home/tim/.local uv path) ----
  if [ ! -x "$HOME/.local/bin/uv" ]; then
    curl -LsSf https://astral.sh/uv/install.sh | sh
  fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -2
  mkdir -p /home/tim/.local/share
  ln -sfn /root/.local/share/uv /home/tim/.local/share/uv

  cd "$KAI0"
  source .venv/bin/activate
  python -c "import torch, cv2; print('torch',torch.__version__,'cv2',cv2.__version__,'cuda',torch.cuda.is_available(),'ngpu',torch.cuda.device_count())"

  DS=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_v4_base_dagger
  CKPT=/vePFS/tim/workspace/deepdive_kai0/kai0/checkpoints/ADVANTAGE_TORCH_KAI0_FLATTEN_FOLD/adv_est_v1/100000
  [ -f "$DS/meta/episodes.jsonl" ]   || { echo "FATAL: dataset missing $DS" >&2; exit 13; }
  [ -f "$CKPT/model.safetensors" ]   || { echo "FATAL: estimator ckpt missing $CKPT" >&2; exit 13; }
  echo "[$(date)] dataset + estimator verified"

  NW=$(( NUMNODES * 8 ))   # total workers = 16
  cd "$KAI0/stage_advantage/annotation"
  for g in 0 1 2 3 4 5 6 7; do
    WID=$(( NODE * 8 + g ))
    echo "[launch] node=$NODE gpu=$g worker-id=$WID / num-workers=$NW"
    CUDA_VISIBLE_DEVICES=$g python -u eval.py Flatten-Fold KAI0 "$DS" --num-workers $NW --worker-id $WID \
        > "$LOG_DIR/awbc_label_${STAMP}_node${NODE}_gpu${g}.log" 2>&1 &
  done
  wait
  echo "=== node $NODE all 8 workers done $(date) ==="

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
