# Exp-C (dagger_validity_and_finetune_comparison.md §8) — RETRAIN on 重构后/裁尾后的 v3 数据
#   2026-06-17: 原 ckpt 误删 + v3 源被 TOS 重构/裁尾原地重处理 → A_v3early_dagger 重建(copy 视频).
#   Robot-GPU开发机队列 (cn-shanghai dev A100), 1-host 8 A100, 50k. Config pi05_flatten_fold_v3early_dagger.
#   Data: A_v3early_dagger (985 base ≤5-10 + 513 dagger v3 = 1498ep, 单 norm, 重建) | Init: mixed_1_clean
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/v3early_dagger_devq_8gpu.yaml

TaskName: "pi05-v3early-dagger-devq-8gpu"
Description: "Exp-C retrain on rebuilt v3 (重构/裁尾后): pi05_flatten_fold_v3early_dagger, JAX 1-host 8 A100, mixed_1_clean init, 50k"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "Robot-GPU开发机队列"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G

ActiveDeadlineSeconds: 172800
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/v3early_dagger_devq_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) node=$NODE (1-host 8 A100, devq) ==="
  set -ex
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  if [ ! -x "$HOME/.local/bin/uv" ]; then curl -LsSf https://astral.sh/uv/install.sh | sh; fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -1
  mkdir -p /home/tim/.local/share && ln -sfn /root/.local/share/uv /home/tim/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  TRAIN=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_v3early_dagger
  INIT=/vePFS/tim/shared_ckpt/Task_A/mixed_1_clean/params
  VAL=/vePFS/tim/workspace/deepdive_kai0/kai0/data/Task_A/self_built/vis_v2_merged_val
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: A_v3early_dagger missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: norm missing" >&2; exit 13; }
  [ -f "$INIT/_METADATA" ]            || { echo "FATAL: mixed_1_clean init missing $INIT" >&2; exit 13; }
  [ -f "$VAL/meta/episodes.jsonl" ]   || { echo "FATAL: inline-eval val missing $VAL" >&2; exit 13; }
  echo "[$(date)] preflight OK (A_v3early_dagger + norm + mixed_1_clean init + val)"

  # 可 resume: 探测 ckpt (= config.checkpoint_dir) → --resume, 否则 fresh --overwrite
  EXP=v3early_dagger_devq
  CKPT_DIR=$KAI0/checkpoints/pi05_flatten_fold_v3early_dagger/$EXP
  if ls -d "$CKPT_DIR"/[0-9]*/ >/dev/null 2>&1; then RES="--resume"; echo "[resume] found ckpt → --resume"; else RES="--overwrite"; echo "[resume] fresh --overwrite"; fi

  exec python -u scripts/train.py pi05_flatten_fold_v3early_dagger \
    --exp-name "$EXP" \
    --no-wandb-enabled \
    $RES

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 2

AccessType: "Public"
