# v2v3 data_window_scaling Exp-B — v3 5-18~5-28 窗口 (8 日, 955 ep, 已裁 v3), 华北北京 16 GPU (2-host H20)
#
#   Config:   pi05_flatten_fold_v3_0518_0528  (config.py, cnbj 路径)
#   Plan:     docs/training/future_plans/plans/v2v3_data_window_scaling_experiments.md Exp-B
#   Data:     A_v3_0518_0528 (955 ep, 已裁 v3, ~1.33M frames)
#   Init:     mixed_1_clean (TOS→cnbj vePFS, 22G 完整)
#   Spec:     2-host × 8 H20 = 16 GPU FSDP, batch 128, 50k step
#
# Submit (VOLC_REGION=cn-beijing 必须!): source ~/.volc_creds && VOLC_REGION=cn-beijing \
#   kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/v3_0518_0528_cnbj_16gpu.yaml

TaskName: "v3-0518-0528-cnbj-16gpu"
Description: "Exp-B v3 5-18~5-28 窗口 955ep: JAX 2-host 16 H20, mixed_1_clean init, 50k"
Tags: []

ImageUrl: "visincept-cn-beijing.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "Robot-North-H20"
Framework: "PyTorch"          # gives MLP_WORKER_0_HOST / MLP_ROLE_INDEX / MLP_WORKER_NUM

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 2
    Flavor: "ml.hpcpni3ln.45xlarge"   # 8× H20-SXM5-96GB per host × 2 = 16 GPU

ActiveDeadlineSeconds: 172800
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnbj875793a96d6b"
    MountPath: "/vePFS-North-E/vis_robot"
    SubPath: "/vis_robot"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: NCCL_DEBUG
    Value: "WARN"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: XLA_PYTHON_CLIENT_MEM_FRACTION
    Value: "0.85"
  - Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES
    Value: "-1"
  - Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS
    Value: "1"
  - Name: JAX_ENABLE_EMPTY_ARRAYS
    Value: "true"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  NODE=${MLP_ROLE_INDEX:-0}
  # --- preflight: prove pod-init + vePFS mount reached (breadcrumb file is readable from gf3) ---
  echo "=== PREFLIGHT $(date) node=$NODE host=$(hostname) ==="
  ls -ld /vePFS-North-E/vis_robot 2>&1 || echo "MOUNT-MISSING"
  LOG_DIR=/vePFS-North-E/vis_robot/logs
  mkdir -p "$LOG_DIR" 2>&1 || echo "MKDIR-FAILED"
  echo "preflight node=$NODE $(date)" > "$LOG_DIR/preflight_v3_0518_0528_${STAMP}_node${NODE}.txt" 2>&1 || echo "BREADCRUMB-WRITE-FAILED"
  LOG="$LOG_DIR/v3_0518_0528_${STAMP}_node${NODE}.log"
  exec >> "$LOG" 2>&1
  echo "=== entrypoint start $(date) node=$NODE/${MLP_WORKER_NUM:-1} ==="
  set -ex
  echo "[multinode] host0=${MLP_WORKER_0_HOST} num=${MLP_WORKER_NUM} idx=${MLP_ROLE_INDEX}"
  nvidia-smi -L

  cd /vePFS-North-E/vis_robot/workspace/deepdive_kai0/kai0
  ls -la .venv/bin/python
  source .venv/bin/activate
  python -c "import jax; print(f'jax {jax.__version__} devs={len(jax.devices())}')"

  TRAIN=/vePFS-North-E/vis_robot/workspace/deepdive_kai0/kai0/data/Task_A/self_built/A_v3_0518_0528
  INIT=/vePFS-North-E/vis_robot/shared_ckpt/Task_A/mixed_1_clean/params
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: train data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: norm_stats missing $TRAIN/norm_stats.json" >&2; exit 13; }
  [ -f "$INIT/_METADATA" ]            || { echo "FATAL: mixed_1_clean init missing $INIT" >&2; exit 13; }
  echo "[$(date)] data + norm_stats + init verified"

  export JAX_COORDINATOR_ADDRESS="${MLP_WORKER_0_HOST}:15830"
  export JAX_NUM_PROCESSES="${MLP_WORKER_NUM:-2}"
  export JAX_PROCESS_INDEX="${MLP_ROLE_INDEX:-0}"

  exec python -u scripts/train.py pi05_flatten_fold_v3_0518_0528 \
    --exp-name v3_0518_0528_cnbj \
    --data.repo_id "$TRAIN" \
    --weight-loader.params-path "$INIT" \
    --no-wandb-enabled \
    --overwrite

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 1

AccessType: "Public"
