# CRAVEвҶ’KAI0-AE и’ёйҰҸ P1 В· AE-B (viterbi+ж—¶й—ҙе…ҲйӘҢ ж Үзӯҫ) вҖ” robot-task 8 A100, 50k
#   plan: docs/training/future_plans/plans/crave_ae_distill_plan.md В§3
#   Config: ADVANTAGE_TORCH_CRAVE_B (AdvantageEstimatorConfig, loss_value=1/action=0, init pi05_base strict=False)
#   Data:   crave_stage_B (3055ep, CRAVE viterbi+ж—¶й—ҙе…ҲйӘҢ stage_progress_gt 0вҶ’1; д»Ҙ kai0_base дёәеә•; videosвҶ’kai0_base; normвҶҗkai0_base)
#   е”ҜдёҖеҸҳйҮҸ vs AE-A = ж Үзӯҫжһ„йҖ жі• (B viterbi+ж—¶й—ҙе…ҲйӘҢ). vs зҺ°жҲҗ AE-C(adv_est_v1)= жҚўжҺүдәәе·ҘеҲҶж®өж ҮжіЁ.
# Submit: source ~/.volc_creds && kai0/.venv/bin/python train_scripts/kai/volc/submit_yaml.py train_scripts/kai/volc/adv_est_crave_B_cnsh_8gpu.yaml

TaskName: "adv-est-crave-b-cnsh-8gpu"
Description: "CRAVEвҶ’AE и’ёйҰҸ AE-B: train AdvantageEstimator on crave_stage_B (viterbi+ж—¶й—ҙе…ҲйӘҢ ж Үзӯҫ), PyTorch 8 A100 50k"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"     # 8Г— A100-80G

ActiveDeadlineSeconds: 259200           # 72 h cap (PyTorch AE ж…ў, 50k иҝңеӨҹ)
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: WANDB_MODE
    Value: "offline"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: OMP_NUM_THREADS
    Value: "8"
  - Name: TORCH_NCCL_BLOCKING_WAIT
    Value: "0"
  - Name: NCCL_ASYNC_ERROR_HANDLING
    Value: "1"

Entrypoint: |
  set -uo pipefail
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/adv_est_crave_B_${STAMP}.log"
  exec >> "$LOG" 2>&1
  echo "=== AE-B (crave_stage_B) train start $(date) (PyTorch DDP 8 A100) ==="
  set -ex
  nvidia-smi -L

  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  mkdir -p /home/tim/.local/share /root/.local/share
  ln -sfn /vePFS/tim/.local/share/uv /home/tim/.local/share/uv
  ln -sfn /vePFS/tim/.local/share/uv /root/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate
  apt-get update 2>&1 | tail -1 && apt-get install -y ffmpeg 2>&1 | tail -1 || echo "ffmpeg install skipped"
  python -c "import torch; print(f'torch {torch.__version__} cuda={torch.cuda.is_available()} dev={torch.cuda.device_count()}')"

  # PRE-FLIGHT (CRAVE viterbi+ж—¶й—ҙе…ҲйӘҢ ж Үзӯҫ; д»Ҙ kai0_base дёәеә•; videos symlinkвҶ’kai0_base; normвҶҗkai0_base)
  TRAIN=$KAI0/data/Task_A/self_built/crave_stage_B
  INIT=/vePFS/tim/workspace/openpi_cache/modelscope_cache/lerobot/pi05_base
  [ -f "$TRAIN/meta/episodes.jsonl" ] || { echo "FATAL: train data missing $TRAIN" >&2; exit 13; }
  [ -f "$TRAIN/norm_stats.json" ]     || { echo "FATAL: norm_stats missing $TRAIN" >&2; exit 13; }
  python -c "import pyarrow.parquet as pq,glob,sys; f=sorted(glob.glob('$TRAIN/data/chunk-000/*.parquet'))[0]; cols=[c.name for c in pq.read_schema(f)]; sys.exit(0 if 'stage_progress_gt' in cols else 13)" || { echo "FATAL: stage_progress_gt missing" >&2; exit 13; }
  V=$(find -L "$TRAIN/videos/chunk-000/observation.images.top_head" -name '*.mp4' -print -quit 2>/dev/null)
  [ -n "$V" ] && [ -e "$V" ] || { echo "FATAL: crave video symlink ж–ӯй“ҫ (videosвҶ’kai0_base еӨұж•Ҳ?)" >&2; exit 13; }
  [ -f "$INIT/model.safetensors" ] || { echo "FATAL: pi05_base pytorch init missing $INIT" >&2; exit 13; }
  echo "[$(date)] preflight OK (crave_stage_B + stage_progress_gt + norm + video resolve + pi05_base)"

  EXP=adv_est_crave_B
  CKPT_DIR=$KAI0/checkpoints/ADVANTAGE_TORCH_CRAVE_B/$EXP
  RES=""
  if ls -d "$CKPT_DIR"/[0-9]*/ >/dev/null 2>&1; then RES="--resume"; echo "[resume] found ckpt вҶ’ --resume"; fi

  MASTER_PORT="${TORCH_DDP_MASTER_PORT:-15843}"
  exec torchrun \
    --nnodes=1 --node_rank=0 --nproc_per_node=8 \
    --master_addr=127.0.0.1 --master_port=$MASTER_PORT \
    scripts/train_pytorch.py ADVANTAGE_TORCH_CRAVE_B \
    --exp_name=$EXP \
    --save_interval 10000 \
    --batch-size 144 \
    $RES

RetryOptions:
    EnableRetry: true
    MaxRetryTimes: 2

AccessType: "Public"
