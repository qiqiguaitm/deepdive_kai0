# V6-T3 自适应视界目标 — 上海 robot-task 队列版(北京8卡被占, 迁上海A100空闲)
# 数据本就在 cnsh vepfs(本机gf0建的), 免22GB传输. base权重(qwen/lawam_pretrain/lam)也在cnsh.
# 坑: lam等符号链接指向 /home/tim/... 绝对路径 → 容器内 entrypoint 重建该链接层解析.
# 提交: gsy 上 cd train_scripts/kai/volc && kai0/.venv/bin/python submit_yaml.py lmwm_adaptive_horizon_cnsh_8a100.yaml
#   (submit_yaml.py 按 robot-task 自动填 cn-shanghai region/queue/vepfs)

TaskName: "lmwm-adaptive-horizon-cnsh-8a100"
Description: "V6 adaptive-horizon target (c=检索时间一致性), 上海robot-task 8xA100 12500steps, LIBERO"
Tags: []

ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/kai:kai0-gf0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"

TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 1
    Flavor: "ml.hpcpni2.28xlarge"   # 8× A100-80G 整节点

ActiveDeadlineSeconds: 43200
EnableTensorBoard: false

Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"

CacheType: "Cloudfs"

Envs:
  - Name: PYTHONUNBUFFERED
    Value: "1"
  - Name: HF_HUB_OFFLINE
    Value: "1"
  - Name: TRANSFORMERS_OFFLINE
    Value: "1"
  - Name: TOKENIZERS_PARALLELISM
    Value: "false"
  - Name: OMP_NUM_THREADS
    Value: "8"

Entrypoint: |
  set -uo pipefail
  REPO=/vePFS/tim/workspace/deepdive_kai0
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=$REPO/lmvla/lawam/logs/volc_dualarm
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/adaptive_horizon_cnsh_${STAMP}.log"
  exec >> "$LOG" 2>&1
  set -x
  echo "=== V6 adaptive-horizon target (cnsh 8xA100) start $(date -u) ==="

  # 坑修: 仓库内符号链接(lam ckpt/yaml, dataset/data)指向 /home/tim/... 绝对路径,
  #       容器只挂 /vePFS 无 /home/tim → 重建该链接层, 令绝对符号链接解析到 /vePFS 真文件.
  mkdir -p /home/tim/workspace
  ln -sfn $REPO /home/tim/workspace/deepdive_kai0
  ls -l /home/tim/workspace/deepdive_kai0/lmvla/lawam/latent_action_model/logs/dino_large_vae/lam_release/checkpoints/pytorch_model.pt

  export PYTHON=$REPO/kai0/.venv/bin/python
  export PATH=$REPO/kai0/.venv/bin:$PATH
  cd $REPO/lmvla/lawam

  nvidia-smi -L | head
  $PYTHON -c "import torch, transformers, accelerate; print(f'torch={torch.__version__} tf={transformers.__version__} acc={accelerate.__version__} cuda={torch.cuda.is_available()}')"
  $PYTHON -c "from starVLA.model.framework.vlas.lawam import LatentWorldPolicyBackend; print('LatentWorldPolicyBackend import OK')"

  LMWM=$REPO/lmvla/lmwm
  MS=$LMWM/data/libero_adaptive
  for f in "$LMWM/checkpoints/lmwm_libero_adaptive/lmwm.pt" "$MS/pairs.npz" "$MS/target_compact.npz" \
           "results/Checkpoints/qwen3_weights/config.json" \
           "results/Checkpoints/pretrain/lawam_pretrain/final_model/pytorch_model.pt" \
           "latent_action_model/logs/dino_large_vae/lam_release/checkpoints/pytorch_model.pt"; do
    [ -e "$f" ] || { echo "FATAL: $f missing/unresolved" >&2; exit 13; }
  done
  echo "[$(date)] preflight OK (adaptive-horizon, base weights + symlinks resolved)"

  export CUDA_VISIBLE_DEVICES=0,1,2,3,4,5,6,7
  export MASTER_PORT=29516
  export LMWM_CKPT=$LMWM/checkpoints/lmwm_libero_adaptive/lmwm.pt
  export LMWM_MILESTONE_TARGET=$MS/pairs.npz
  export LMWM_TARGET_COMPACT=$MS/target_compact.npz
  export LMWM_ADAPTER_DIR=$REPO/lmvla/lawam
  export LMWM_SWAP_TEACHER=1
  # 不设 LMWM_HINT_DROPOUT: T3 优雅在目标本身, vanilla 训练/推理
  export LAWAM_RUN_TIMESTAMP=${STAMP}

  bash train_lawam_distributed.sh \
    --config_yaml starVLA/config/training/train_libero.yaml \
    --run_id=lmwm_adaptive_horizon_cnsh_volc \
    --trainer.max_train_steps=12500 \
    --trainer.save_interval=2500

  echo "=== V6 adaptive-horizon target (cnsh) DONE $(date -u) ==="

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0

AccessType: "Public"
