TaskName: "xvla-stage1-kai-warmup-16gpu"
Description: "X-VLA Stage 1: kai0_base+dagger warmup. pi05_base init + soft_prompt_hub(num_domains=2,len=32) X-VLA std=0.02 init. Full unfreeze, 50k step."
Tags: []
UserCodePath: ""
RemoteMountCodePath: ""
ImageUrl: "visincept-cn-shanghai.cr.volces.com/grasp/h2r:1.0"
ResourceQueueName: "robot-task"
Framework: "PyTorch"
TaskRoleSpecs:
  - RoleName: "worker"
    RoleReplicas: 2
    Flavor: "ml.hpcpni2.28xlarge"
ActiveDeadlineSeconds: 172800
EnableTensorBoard: false
Storages:
  - Type: "Vepfs"
    VepfsId: "vepfs-cnsh075262e1f815"
    SubPath: ""
    MountPath: "/vePFS"
CacheType: "Cloudfs"
Envs:
  - {Name: HF_HUB_OFFLINE, Value: "1", IsPrivate: false}
  - {Name: TRANSFORMERS_OFFLINE, Value: "1", IsPrivate: false}
  - {Name: TOKENIZERS_PARALLELISM, Value: "false", IsPrivate: false}
  - {Name: NCCL_DEBUG, Value: "WARN", IsPrivate: false}
  - {Name: OMP_NUM_THREADS, Value: "8", IsPrivate: false}
  - {Name: XLA_PYTHON_CLIENT_MEM_FRACTION, Value: "0.85", IsPrivate: false}
  - {Name: JAX_COMPILATION_CACHE_MIN_ENTRY_SIZE_BYTES, Value: "-1", IsPrivate: false}
  - {Name: JAX_COMPILATION_CACHE_MIN_COMPILE_TIME_SECS, Value: "1", IsPrivate: false}
  - {Name: JAX_ENABLE_EMPTY_ARRAYS, Value: "true", IsPrivate: false}

Entrypoint: |
  STAMP=$(date -u +%Y%m%d_%H%M%S)
  LOG_DIR=/vePFS/tim/workspace/deepdive_kai0/logs
  mkdir -p "$LOG_DIR"
  LOG="$LOG_DIR/xvla_stage1_${STAMP}_node${MLP_ROLE_INDEX:-0}.log"
  exec >> "$LOG" 2>&1
  echo "=== xvla stage1 kai warmup start $(date) node=${MLP_ROLE_INDEX:-0}/${MLP_WORKER_NUM:-1} ==="
  set -ex
  nvidia-smi -L
  # torchcodec needs FFmpeg shared libs (libavutil/libavcodec/libavformat/libswscale).
  if ! ldconfig -p 2>/dev/null | grep -q libavutil; then
    (apt-get update -qq && apt-get install -y -qq ffmpeg) 2>&1 | tail -5
  fi
  KAI0=/vePFS/tim/workspace/deepdive_kai0/kai0
  # Pre-clean ckpt dir on node 0 only to avoid orbax multi-host sync race when
  # --overwrite half-recreates the dir mid-barrier (AssertionError: sync_global_devices
  # name mismatch on CheckpointManager:save_root_metadata).
  if [ "${MLP_ROLE_INDEX:-0}" = "0" ]; then
    rm -rf "$KAI0/checkpoints/xvla_stage1_kai_warmup" 2>/dev/null || true
  fi
  # All nodes wait until the dir is in a stable post-cleanup state before training launches.
  sleep 5
  if [ ! -x "$HOME/.local/bin/uv" ]; then
    curl -LsSf https://astral.sh/uv/install.sh | sh
  fi
  export PATH="$HOME/.local/bin:$PATH"
  uv python install 3.11.15 2>&1 | tail -2
  mkdir -p /home/tim/.local/share
  ln -sfn /root/.local/share/uv /home/tim/.local/share/uv
  cd "$KAI0"
  source .venv/bin/activate
  python -c "import torch, jax; print(f'torch {torch.__version__} jax {jax.__version__} devs={len(jax.devices())}')"
  export JAX_COORDINATOR_ADDRESS="${MLP_WORKER_0_HOST}:15830"
  export JAX_NUM_PROCESSES="${MLP_WORKER_NUM:-2}"
  export JAX_PROCESS_INDEX="${MLP_ROLE_INDEX:-0}"
  echo "JAX coord: $JAX_COORDINATOR_ADDRESS  procs=$JAX_NUM_PROCESSES  idx=$JAX_PROCESS_INDEX"
  exec python -u scripts/train.py xvla_stage1_kai_warmup \
    --exp-name xvla_stage1_kai_warmup \
    --no-wandb-enabled \
    --overwrite

RetryOptions:
    EnableRetry: false
    MaxRetryTimes: 0
AccessType: "Public"
