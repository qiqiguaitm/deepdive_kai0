# wam_fold_nano — Cosmos3-Nano-Policy posttrain on the WAM dual-arm fold dataset.
# Consumed by cosmos_framework.configs.toml_config.sft_config.load_experiment_from_toml.
# The full dataloader wiring (WamFoldLeRobotDataset + ActionDataPacker) lives in
# the experiment Python (configs/base/experiment/action/posttrain_config/wam_fold_nano.py);
# this TOML only overrides top-level scalars.

[job]
task         = "vfm"
experiment   = "wam_fold_nano"
project      = "cosmos3"
group        = "action"
name         = "wam_fold_nano"
wandb_mode   = "offline"

[model]
max_num_tokens_after_packing = 45056
joint_attn_implementation    = "two_way"
precision                    = "bfloat16"

# CRASH FIX (exitCode 137 OOMKilled @ step 386): EMA kept a full ~32-64 GB CPU copy of the
# 16B model (GPU peak was only 33 GB → EMA lives on CPU), stacked on the climbing pfsl2 video
# cache (CPU RAM hit 101.9 GB by step 200) → CPU OOM-killer. Disabling EMA frees that copy
# (the documented fix: prior 16B run went 50k steps zero-OOM after disabling EMA). Harmless
# here: eval uses the RAW transformer, never the EMA copy (high-decay EMA lags mid-training).
[model.ema]
enabled         = false
rate            = 0.1
iteration_shift = 0

[model.parallelism]
data_parallel_shard_degree     = 8                      # HSDP: shard within node (8 GPU, NVLink) — 16B fits per-node
data_parallel_replicate_degree = 4                      # replicate across 4 nodes (1 grad all-reduce/step, not per-layer)

[model.compile]
enabled         = true
compile_dynamic = true

# MFU lever #5 TESTED AND REVERTED: mode="none" OOM'd even at batch 8 (77 GB alloc / 80 GB
# cap) — full activation storage for the 16B MoT needs ~46 GB more than the recompute path.
# The "40 GB free" seen under selective was exactly what AC buys by recomputing. AC is
# REQUIRED at this model size / 45k-token budget; selective+fmha is the proven config (ran
# to step 300 at 31 GB peak). backward(2.47s)<forward(3.59s) already showed recompute isn't
# the bottleneck, so there's little to gain here anyway. Keep selective.
[model.activation_checkpointing]
mode               = "selective"
save_ops_regex     = ["fmha"]
preserve_rng_state = true
determinism_check  = "default"

[model.tokenizer]
vae_path = "${oc.env:WAN_VAE_PATH}"

[optimizer]
betas          = [0.9, 0.95]
eps            = 1.0e-8
fused          = true
keys_to_select = []
lr             = 2.0e-5
weight_decay   = 0

# CRASH FIX: cycle_lengths was [300] (leftover from the 300-step smoke recipe). The
# LambdaCosine scheduler indexes cycle_lengths/warm_up_steps by the current cycle; once
# global_step reaches sum(cycle_lengths)=300 the cycle index becomes None →
# omegaconf KeyValidationError ("ListConfig indices ... not NoneType") and the whole job
# dies. This is what killed b4b51 / vxj6u8wbneoi at step ~300-340. One cosine cycle must
# span the FULL run: set cycle_lengths = max_iter (10000). Keep the 30-step warmup.
[scheduler]
cycle_lengths      = [10000]
f_max              = [1.0]
f_min              = [0.0]
f_start            = [0.0]
verbosity_interval = 0
warm_up_steps      = [30]

[trainer]
distributed_parallelism = "fsdp"
grad_accum_iter         = 1
logging_iter            = 1
max_iter                = 300

[trainer.callbacks.grad_clip]
clip_norm    = 0.1
force_finite = true

[checkpoint]
keys_to_skip_loading = [
    "net_ema.",
    "action2llm.",
    "llm2action.",
    "action_modality_embed",
    "action_pos_embed.",
]
load_path     = "${oc.env:BASE_CKPT_DCP}"
save_iter     = 100
# strict_resume is set to false in the experiment Python (not a TOML schema field).

# NOTE: no [dataloader_train] block. On the VFM task, max_sequence_length is
# emitted verbatim as dataloader_train.max_sequence_length=... but this
# experiment uses DataPackerDataLoader (ctor kwarg is max_tokens, not
# max_sequence_length), so a verbatim override would fail. max_tokens (45056)
# is set directly in the experiment Python (wam_fold_nano.py) instead. To change
# the token budget, pass an extra CLI override:
#   dataloader_train.max_tokens=<N>
