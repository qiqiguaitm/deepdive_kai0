    resolution: 640x480
    fps: 30
    ros2_topic_color: /camera_l/camera_l/color/image_rect_raw
    ros2_topic_depth: /camera_l/camera_l/depth/image_rect_raw

  hand_right:
    model: Intel RealSense D405
