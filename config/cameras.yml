# RealSense 相机配置 — sim01 部署
# 通过 pyrealsense2 枚举获取, 2026-04-01

cameras:
  top_head:
    model: Intel RealSense D435
    serial_number: "254622070889"
    firmware: "5.15.1.55"
    product_id: "0B07"
    usb_type: "3.2"
    physical_port: usb2/2-1.2
    role: 俯视全局相机
    resolution: 640x480
