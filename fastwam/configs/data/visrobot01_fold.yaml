# visrobot01 叠衣服(wam_fold_v1)—— abs joint angle 输出。
# 与 robotwin.yaml 的差异:dataset_dirs→wam_fold_v1/visrobot01_train;num_frames 33→49
# (chunk 48,对齐 GWP mae@48 协议;(49-1)%4=0 且 12%4=0 满足 VAE 时域约束);
# stats/text-cache 路径。其余(3 相机同名 key、14 维、z-score、delta mask 缺省=全 absolute)
# 与 robotwin 相同 —— 即用户要求的 abs angle 表示。
train:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - /mnt/pfs/p46h4f/cosmos/deepdive_kai0/kai0/data/wam_fold_v1/visrobot01_train
  shape_meta:
    images:
      - key: cam_high
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_left_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_right_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14 # before transform
        shape: 14 # after transform
    state:
      - key: default
        raw_shape: 14 # before transform
        shape: 14 # after transform
  num_frames: 49
  global_sample_stride: 1
  action_video_freq_ratio: 4 # 48 action, 13 video frames(对齐 GWP chunk48/mae@48 协议)
  video_size: [384, 320] # final resize video
  camera_key: null
  # 0.0:训练用全集(真 eval 在外部 visrobot01_val 200-ep)。同时是 latent 缓存的硬前提——
  # 非 0 会让 split 重排 episode 编号,与按全集 mp4 编号建的 vae_latent 缓存错位(画面对错集)。
  val_set_proportion: 0.0
  is_training_set: true
  pretrained_norm_stats: ./data/visrobot01_fold/dataset_stats.json
  skip_padding_as_possible: false
  concat_multi_camera: "robotwin"
  latent_cache_dir: /mnt/pfs/p46h4f/cosmos/deepdive_kai0/kai0/data/wam_fold_v1/visrobot01_train/vae_latent
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14

    # action & state normalization
    action_state_transforms: null
    # action_state_transforms:
    #   - _target_: fastwam.datasets.lerobot.transforms.libero.LiberoTransform
    use_stepwise_action_norm: False
    norm_default_mode: "z-score"
    norm_exception_mode: null

    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign

    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: ./data/text_embeds_cache/visrobot01_fold
  context_len: 128

val:
