# @package _global_
# visrobot01 叠衣服 abs-angle uncond 训练(配方对齐释出 robotwin_uncond_3cam_384_1e-4,
# 仅换数据;epochs/steps 由 smoke 吞吐后定,先以 max_steps 控制)。

defaults:
  - override /data: visrobot01_fold
  - override /model: fastwam
  - _self_

# dataloading
batch_size: 16
num_workers: 8

model:
  mot_checkpoint_mixed_attn: false
  redirect_common_files: false  # 用本地 dreamzero 原始 .pth(VAE/T5),不拉 DiffSynth 转换件

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 5
max_steps: null
log_every: 10
save_every: 2500
eval_every: 500

# training
gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: null
